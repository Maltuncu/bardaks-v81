/* Trigger: dokunma → span→input | Auto-Focus + Select | Action: blur/Enter → save | Validation: Number() | Feedback: flash */
function InlineEdit({value,onSave,type,fmt:fmtFn,style:s,placeholder}){
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState("");
  const[flash,setFlash]=useState(false);
  const ref=useRef(null);
  const activate=()=>{setVal(String(value??""));setEditing(true);};
  useEffect(()=>{if(editing&&ref.current){ref.current.focus();ref.current.select();}},[editing]);
  const commit=()=>{
    setEditing(false);
    if(val==="")return;
    const nv=type==="number"?Number(val):val;
    if(String(nv)===String(value))return;
    onSave(nv);
    setFlash(true);setTimeout(()=>setFlash(false),900);
  };
  const onKey=(e)=>{if(e.key==="Enter"){e.preventDefault();commit();}if(e.key==="Escape")setEditing(false);};
  if(editing)return<input ref={ref} type={type||"text"} inputMode={type==="number"?"decimal":"text"} value={val} onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={onKey} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"inherit",fontWeight:700,color:"#1B4F8E",padding:"3px 6px",border:"2px solid #1B4F8E",borderRadius:6,outline:"none",width:"100%",maxWidth:120,boxSizing:"border-box",background:"rgba(27,79,142,0.06)",minHeight:28,...s}}/>;
  const display=fmtFn?fmtFn(value):(value??placeholder??"—");
  return<div onClick={activate} onTouchEnd={(e)=>{e.preventDefault();activate();}} style={{cursor:"pointer",borderRadius:5,padding:"3px 6px",minHeight:24,display:"inline-flex",alignItems:"center",gap:4,background:flash?"rgba(45,168,84,0.25)":"rgba(27,79,142,0.04)",border:flash?"1.5px solid rgba(45,168,84,0.4)":"1px dashed rgba(27,79,142,0.18)",transition:"all .3s ease",fontFamily:"'JetBrains Mono',monospace",WebkitUserSelect:"none",userSelect:"none",...s}}><span style={{pointerEvents:"none",fontWeight:700}}>{display}</span><span style={{fontSize:8,opacity:.35,pointerEvents:"none"}}>✎</span></div>;
}

      setAnalyzing(false);

  return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}>

    <Header title={"Z-Raporu — "+sube} crumbs={sirket==="ltd"?"Limited":"Şahıs"} onHome={goHome} onBack={goBack}/>
    <div style={{flex:1,overflow:"auto",padding:14}}>
      <div style={{background:D.w,borderRadius:16,boxShadow:D.s2,padding:18,maxWidth:480,margin:"0 auto"}}>

function Finance({goHome,onNav,data,setData}){

  const d=data[co]||defData[co];const kT=(d.krediler||[]).reduce((s,k)=>s+k.monthly*k.remaining,0);const cT=(d.kartlar||[]).reduce((s,k)=>s+k.used,0);const sT=(d.sahis||[]).reduce((s,b)=>s+b.tutar,0);const aT=(d.altin||[]).reduce((s,a)=>s+a.gram*gp,0);const ckT=(d.cekler||[]).reduce((s,c)=>s+c.tutar,0);const grand=kT+cT+sT+aT+ckT;

  const warns=[];(d.krediler||[]).forEach(k=>{const dd=daysTil(k.nextDate);if(dd>=0&&dd<=5)warns.push(k.bank+" — "+dd+"g");});(d.kartlar||[]).forEach(k=>{const dd=daysTil(k.odeme);if(dd>=0&&dd<=5)warns.push(k.name+" — "+dd+"g");});(d.cekler||[]).forEach(c=>{if(!c.tahsil){const dd=daysTil(c.vade);if(dd>=0&&dd<=5)warns.push("["+(c.banka||"Çek")+"] "+fmtTL(c.tutar)+" "+c.no+" — "+dd+"g");}});

      /* ═══ ANA GÖRÜNÜM: 3 KATMANLI HİYERARŞİ ═══ */

          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:800,borderTop:"1px solid rgba(232,156,28,0.2)",paddingTop:5,marginTop:5,color:D.g}}><span>Vergi Kalkanı</span><span>{fmtTL(Math.round(konsolide.muaf*(co==="ltd"?0.25:0.27)))}</span></div>
        </div>

        {konsolide.prim>0&&<div className="fu" style={{background:D.rS,borderRadius:10,padding:"8px 10px",marginTop:6}}><div style={{fontSize:11,fontWeight:700,color:D.r}}>⚠️ Nakit Prim Toplamı: {fmtTL(konsolide.prim)} — Bordroya girmez</div></div>}
      </div>;
    }
    if(sub==="vergi")return<VergiPanel data={data} co={co} gp={gp}/>;
    if(sub==="gider"){
      const kiralar=d.kiralar||[];const faturalar=d.faturalar||[];
      /* ═══ KİRA HESAPLAMALARI — Stopaj OPSİYONEL ═══ */
      /* stopajVar: true/false. true ise Brüt=Net/0.80, Stopaj=%20×Brüt */
      const kiraCalc=kiralar.map(k=>{
        const net=k.net||0;
        const periyod=k.periyod||"aylik";
        const stopajVar=k.stopajVar!==false;/* default true, milli emlak gibi yerlerde false */
        const aylikNet=periyod==="yillik"?Math.round(net/12):net;
        const aylikBrut=stopajVar?Math.round(aylikNet/0.80):aylikNet;
        const aylikStopaj=stopajVar?(aylikBrut-aylikNet):0;
        const yillikNet=periyod==="yillik"?net:net*12;
        const yillikBrut=stopajVar?Math.round(yillikNet/0.80):yillikNet;
        const yillikStopaj=stopajVar?(yillikBrut-yillikNet):0;
        const artisLog=k.artisLog||[];
        let artisUyari=false;
        if(k.artisTarih){const at=new Date(k.artisTarih);const now=new Date();const fark=Math.ceil((at-now)/864e5);if(fark<=30&&fark>=-7)artisUyari=true;}
        return{...k,periyod,stopajVar,aylikNet,aylikBrut,aylikStopaj,yillikNet,yillikBrut,yillikStopaj,artisLog,artisUyari};
      });
      const topKiraAylikNet=kiraCalc.reduce((s,k)=>s+k.aylikNet,0);
      const topKiraAylikStopaj=kiraCalc.reduce((s,k)=>s+k.aylikStopaj,0);
      const topKiraYillikNet=kiraCalc.reduce((s,k)=>s+k.yillikNet,0);
      const topKiraYillikStopaj=kiraCalc.reduce((s,k)=>s+k.yillikStopaj,0);
      const topKiraNet=topKiraAylikNet;const topStopaj=topKiraAylikStopaj;
      /* ═══ FATURA HESAPLAMALARI — tutar = KDV DAHİL TOPLAM ═══ */
      const fatCalc=faturalar.map(f=>{
        const{matrah,kdv}=kdvAyirGlobal(f.tutar,f.kdvOran||0);
        return{...f,matrah,kdvTutar:kdv,toplamFatura:f.tutar};
      });
      const topFaturaToplam=fatCalc.reduce((s,f)=>s+f.tutar,0);/* KDV dahil toplam */
      const topFaturaMatrah=fatCalc.reduce((s,f)=>s+f.matrah,0);/* KDV hariç matrah */
      const topFaturaKDV=fatCalc.reduce((s,f)=>s+f.kdvTutar,0);/* Toplam KDV */
      const odenmis=fatCalc.filter(f=>f.durum==="odendi");
      const bekleyen=fatCalc.filter(f=>f.durum!=="odendi");
      const topGider=topKiraNet+topFaturaMatrah;
      /* ═══ ŞUBE BAZLI GİDER ANALİZİ ═══ */
      const subeGider=(sube)=>{
        const sk=kiraCalc.filter(k=>(k.sube||k.yer||"").toLowerCase().includes(sube.toLowerCase()));
        const sf=fatCalc.filter(f=>(f.sube||"").toLowerCase().includes(sube.toLowerCase()));
        return{kira:sk.reduce((s,k)=>s+k.net,0),fatura:sf.reduce((s,f)=>s+f.tutar,0),
          kdv:sf.reduce((s,f)=>s+f.kdvTutar,0),toplam:sk.reduce((s,k)=>s+k.net,0)+sf.reduce((s,f)=>s+f.tutar,0)};
      };

      /* ═══ EKLEME FONKSİYONLARI ═══ */
      const addKira=()=>{
        const yer=prompt("Mülk Adı (Meydan Dükkan, KTÜ Dükkan vb.):");if(!yer)return;
        const net=Number(prompt("Ödediğin Kira (₺):")||0);if(!net)return;
        const periyod=confirm("Bu kira AYLIK mı? (İptal=Yıllık)")?"aylik":"yillik";
        const stopajVar=confirm("Stopaj (%20) hesaplansın mı? (Tamam=Evet, İptal=Hayır — Milli Emlak gibi)");
        const sahip=prompt("Mülk Sahibi (opsiyonel):")||"";
        const sube=prompt("Şube (Meydan/İmalathane/KTÜ/Samsun):")||"";
        update("kiralar",[...kiralar,{id:nid(),yer,sahip,net,periyod,stopajVar,sube,artisLog:[]}]);
      };
      const delKira=id=>update("kiralar",kiralar.filter(k=>k.id!==id));
      const artisYap=(id)=>{
        const k=kiralar.find(x=>x.id===id);if(!k)return;
        const yeniNet=Number(prompt("Yeni Net Kira (₺):",k.net));if(!yeniNet)return;
        const yeniArtisTarih=prompt("Bir sonraki artış tarihi (YYYY-AA-GG):",k.artisTarih)||"";
        const log=[...(k.artisLog||[]),{tarih:TODAY.toISOString().split("T")[0],eskiNet:k.net,yeniNet}];
        update("kiralar",kiralar.map(x=>x.id===id?{...x,net:yeniNet,artisTarih:yeniArtisTarih,artisLog:log}:x));
      };

      const FATURA_TIPLERI=["Elektrik (Aksa)","Su (TİSKİ)","İnternet (Türk Telekom)","Doğalgaz (Aksa)","Tüp (Mutfak)","Aidat","Yemek (Setcard)","Bakım/Onarım","Diğer"];
      const SUBE_LISTESI=["Meydan","İmalathane","KTÜ","Samsun"];
      const addFaturaModal=()=>setFaturaForm({tip:FATURA_TIPLERI[0],tutar:"",kdvOran:20,sube:SUBE_LISTESI[0],periyod:"aylik",not:""});
      const saveFaturaForm=()=>{
        if(!faturaForm||!faturaForm.tutar)return;
        const tutar=Number(faturaForm.tutar);const kdvOran=Number(faturaForm.kdvOran);
        /* tutar artık KDV dahil toplam, kdv ayrıca saklanmıyor — hesaplanıyor */
        update("faturalar",[...faturalar,{id:nid(),tip:faturaForm.tip,tutar,kdvOran,sube:faturaForm.sube,periyod:faturaForm.periyod,durum:"bekliyor",tarih:TODAY.toISOString().split("T")[0],not:faturaForm.not||""}]);
        setFaturaForm(null);
      };
      const addSabitModal=()=>setFaturaForm({tip:"Tüp (Mutfak)",tutar:"",kdvOran:0,sube:SUBE_LISTESI[0],periyod:"aylik",not:""});
      const delFatura=id=>update("faturalar",faturalar.filter(f=>f.id!==id));
      const toggleOdeme=(id)=>{update("faturalar",faturalar.map(f=>f.id===id?{...f,durum:f.durum==="odendi"?"bekliyor":"odendi",odemeTarih:f.durum!=="odendi"?TODAY.toISOString().split("T")[0]:""}:f));};

      return<div>
        {/* ═══ ÖZET BANNER ═══ */}
        <div className="fu" style={{background:`linear-gradient(135deg,${D.blue},${D.blueDk})`,borderRadius:16,padding:14,marginBottom:10,color:D.w}}>
          <div style={{fontSize:10,opacity:.6}}>🏠 Kira & Gider Paneli ({co==="ltd"?"Limited":"Şahıs"}) — v34 Hızlı Müdahale</div>

            <div><div style={{fontSize:7,opacity:.5}}>Kiralar (Net)</div><div style={{fontSize:14,fontWeight:800,fontFamily:D.fd}}>{fmtTL(topKiraNet)}</div></div>
            <div><div style={{fontSize:7,opacity:.5}}>Stopaj</div><div style={{fontSize:14,fontWeight:800,fontFamily:D.fd,color:"#fbbf24"}}>{fmtTL(topStopaj)}</div></div>
            <div><div style={{fontSize:7,opacity:.5}}>Faturalar (KDV dahil)</div><div style={{fontSize:14,fontWeight:800,fontFamily:D.fd}}>{fmtTL(topFaturaToplam)}</div></div>
            <div><div style={{fontSize:7,opacity:.5}}>Toplam KDV</div><div style={{fontSize:14,fontWeight:800,fontFamily:D.fd,color:"#4ade80"}}>{fmtTL(topFaturaKDV)}</div></div>

        </div>

        {/* ═══ KİRALAR — DİNAMİK KÜNYE ═══ */}

        </div>
        {kiraCalc.map((k,i)=><div key={k.id} className="fu" style={{background:D.w,borderRadius:14,padding:"11px 13px",boxShadow:D.s1,marginBottom:8,border:k.artisUyari?`2px solid ${D.o}`:`1px solid ${D.blueBd}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
            <div>
              <div style={{fontWeight:700,fontSize:13}}>{k.yer}
                <span style={{fontSize:8,background:k.periyod==="yillik"?"rgba(168,85,247,0.12)":D.blueMi,color:k.periyod==="yillik"?"#7c3aed":D.blue,padding:"1px 5px",borderRadius:4,marginLeft:4,fontWeight:600}}>{k.periyod==="yillik"?"YILLIK":"AYLIK"}</span>

                {k.artisUyari&&<span style={{fontSize:8,background:D.o,color:D.w,padding:"1px 5px",borderRadius:4,marginLeft:3,animation:"pulse 1.5s infinite"}}>ARTIŞ</span>}

          </div>

function Satis({name,goHome,goBack,onNav,qb,data,setData,user}){
const[cat,setCat]=useState("kahve");const[cart,setCart]=useState([]);const[satisOK,setSatisOK]=useState(null);
const prods=PRODS.filter(p=>p.c===cat);const total=cart.reduce((s,c)=>s+c.p*c.q,0);
const add=p=>setCart(prev=>{const e=prev.find(c=>c.id===p.id);if(e)return prev.map(c=>c.id===p.id?{...c,q:c.q+1}:c);return[...prev,{...p,q:1}];});
const remove=p=>setCart(prev=>{const e=prev.find(c=>c.id===p.id);if(!e)return prev;if(e.q<=1)return prev.filter(c=>c.id!==p.id);return prev.map(c=>c.id===p.id?{...c,q:c.q-1}:c);});
/* ═══ SATIŞ ONAYLA — Veriyi data'ya yaz ═══ */
const onayla=(tip)=>{
  if(cart.length===0||!data||!setData)return;
  const satis={id:nid(),sube:name,tarih:new Date().toISOString(),tip,tutar:total,kalemler:cart.map(c=>({ad:c.n,adet:c.q,fiyat:c.p})),personel:user?.name||"?"};
  const co=qb||"sahis";
  setData(prev=>{const nd=JSON.parse(JSON.stringify(prev));
    if(!nd[co].anlikSatislar)nd[co].anlikSatislar=[];
    nd[co].anlikSatislar.push(satis);
    return nd;
  });
  setSatisOK({tip,tutar:total});
  setCart([]);
  setTimeout(()=>setSatisOK(null),2500);
};
/* Satış onay animasyonu */
if(satisOK)return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style>
  <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
    <div className="fu" style={{fontSize:56,marginBottom:16}}>{satisOK.tip==="nakit"?"💵":"💳"}</div>
    <div className="fu" style={{fontSize:24,fontWeight:800,color:D.g,fontFamily:D.fd}}>{fmtTL(satisOK.tutar)}</div>
    <div className="fu" style={{fontSize:14,color:D.t2,marginTop:8}}>{satisOK.tip==="nakit"?"Nakit":"Kart"} ile satış kaydedildi ✓</div>
    <div style={{fontSize:11,color:D.t3,marginTop:4}}>{name} • {user?.name||""}</div>
  </div>
</div>;
return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style><Header title={"Satış — "+name} onHome={goHome} onBack={goBack}/><div style={{flex:1,display:"flex",overflow:"hidden"}}><div style={{flex:1,display:"flex",flexDirection:"column"}}><div style={{display:"flex",gap:5,padding:"8px 12px",flexWrap:"wrap"}}>{CATS.map(c=>{const ac=cat===c.id;return<button key={c.id} onClick={()=>setCat(c.id)} className="tap" style={{display:"flex",alignItems:"center",gap:5,padding:"5px 9px 5px 5px",borderRadius:50,border:"none",cursor:"pointer",background:ac?D.blue:D.w,boxShadow:D.s1}}><Img src={A[c.a]} size={22} round/><span style={{fontSize:11,fontWeight:600,color:ac?D.w:D.t,whiteSpace:"nowrap"}}>{c.n}</span></button>;})}</div><div style={{flex:1,overflow:"auto",padding:"3px 12px 12px"}}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(95px,1fr))",gap:6}}>{prods.map(p=>{const ic=cart.find(c=>c.id===p.id);return<button key={p.id} onClick={()=>add(p)} className="tap" style={{background:D.w,borderRadius:12,border:ic?`2px solid ${D.blue}`:`1px solid ${D.blueBd}`,padding:"10px 7px 7px",cursor:"pointer",textAlign:"left",position:"relative",boxShadow:D.s1}}>{ic&&<div style={{position:"absolute",top:4,right:4,width:18,height:18,borderRadius:9,background:D.blue,color:D.w,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{ic.q}</div>}<div style={{fontSize:11,fontWeight:600}}>{p.n}</div><div style={{fontSize:13,fontWeight:800,color:D.blue,fontFamily:D.fd}}>₺{p.p}</div></button>;})}</div></div></div>
<div style={{width:230,background:D.w,borderLeft:`1px solid ${D.blueBd}`,display:"flex",flexDirection:"column"}}><div style={{padding:"10px 12px",borderBottom:`1px solid ${D.blueBd}`,fontWeight:700,fontSize:13}}>Adisyon <span style={{fontSize:10,color:D.t3,fontWeight:400}}>{name}</span></div><div style={{flex:1,overflow:"auto"}}>{cart.map(it=><div key={it.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 12px",borderBottom:`1px solid ${D.blueGh}`,fontSize:11}}><div style={{display:"flex",alignItems:"center",gap:4}}><button onClick={()=>remove(it)} className="tap" style={{width:18,height:18,borderRadius:9,border:"none",background:D.rS,color:D.r,fontSize:10,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button><span>{it.q}× {it.n}</span></div><span style={{fontWeight:700,color:D.blue,fontFamily:D.fd}}>₺{it.p*it.q}</span></div>)}</div>{cart.length>0&&<div style={{padding:"10px 12px",borderTop:`1px solid ${D.blueBd}`,background:D.ivory}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontWeight:600,fontSize:12}}>Toplam</span><span style={{fontSize:18,fontWeight:800,color:D.blue,fontFamily:D.fd}}>₺{fmt(total)}</span></div><div style={{display:"flex",gap:5}}><button onClick={()=>onayla("nakit")} className="tap" style={{flex:1,padding:10,borderRadius:10,border:"none",background:D.g,cursor:"pointer",fontWeight:700,color:D.w,fontSize:12,fontFamily:D.f}}>💵 Nakit</button><button onClick={()=>onayla("kart")} className="tap" style={{flex:1,padding:10,borderRadius:10,border:"none",background:D.blue,cursor:"pointer",fontWeight:700,color:D.w,fontSize:12,fontFamily:D.f}}>💳 Kart</button></div><button onClick={()=>setCart([])} className="tap" style={{width:"100%",padding:6,borderRadius:8,border:"none",background:D.rS,cursor:"pointer",fontWeight:600,color:D.r,fontSize:10,fontFamily:D.f,marginTop:5}}>🗑 Sepeti Temizle</button></div>}</div></div></div>;}

/* ═══ İMALATHANE PERSONEL EKRANI — Sadece Miktar, Fiyat Yok ═══ */
function SevkPersonel({goBack,data,setData,user}){
  const[secili,setSecili]=useState([]);
  const[hedefTip,setHedefTip]=useState("ic");/* ic veya dis */
  const[hedef,setHedef]=useState(SEVK_HEDEFLER_IC[0]);
  const[disFirma,setDisFirma]=useState("");
  const[not,setNot]=useState("");
  const[kayitOK,setKayitOK]=useState(null);
  const[tab,setTab]=useState("yeni");
  const firmalar=loadFirmalar();

  const bekleyenler=(data.ltd.sevkBekleyen||[]);
  const bugun=new Date().toISOString().split("T")[0];

  const addUrun=(u)=>{const e=secili.find(s=>s.id===u.id);if(e)setSecili(secili.map(s=>s.id===u.id?{...s,adet:s.adet+1}:s));else setSecili([...secili,{...u,adet:1}]);};
  const removeUrun=(id)=>{const e=secili.find(s=>s.id===id);if(!e)return;if(e.adet<=1)setSecili(secili.filter(s=>s.id!==id));else setSecili(secili.map(s=>s.id===id?{...s,adet:s.adet-1}:s));};
  const topAdet=secili.reduce((s,u)=>s+u.adet,0);

  const sevkGonder=()=>{
    if(secili.length===0)return;
    const hedefAd=hedefTip==="dis"?(disFirma||"Belirtilmemiş"):hedef;
    const sevk={id:nid(),tarih:bugun,saat:new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}),
      kaynak:"İmalathane",hedef:hedefAd,hedefTip,
      kalemler:secili.map(s=>({id:s.id,ad:s.ad,adet:s.adet,birim:s.birim})),
      topAdet,personel:user?.name||"?",not:not||"",
      durum:hedefTip==="dis"?"bekliyor":"onaylandi"/* İç sevkler direkt onaylanır */
    };
    setData(prev=>{const nd=JSON.parse(JSON.stringify(prev));
      if(hedefTip==="dis"){
        /* Dış firma → Müdür onayına gönder */
        if(!nd.ltd.sevkBekleyen)nd.ltd.sevkBekleyen=[];
        nd.ltd.sevkBekleyen.push(sevk);
      }else{
        /* İç sevk → direkt kayıt */
        if(!nd.ltd.sevkler)nd.ltd.sevkler=[];
        nd.ltd.sevkler.push(sevk);
        const hedefSirket=["KTÜ","Samsun"].includes(hedefAd)?"sahis":"ltd";
        if(!nd[hedefSirket].malKabul)nd[hedefSirket].malKabul=[];
        nd[hedefSirket].malKabul.push({...sevk,durum:"teslim"});
      }
      return nd;
    });
    setKayitOK({hedef:hedefAd,topAdet,tip:hedefTip});
    setSecili([]);setNot("");setDisFirma("");
    setTimeout(()=>setKayitOK(null),2500);
  };

  if(kayitOK)return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style>
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
      <div className="fu" style={{fontSize:56,marginBottom:16}}>{kayitOK.tip==="dis"?"📋":"🚚"}</div>
      <div className="fu" style={{fontSize:18,fontWeight:800,color:D.g}}>{kayitOK.tip==="dis"?"Onaya Gönderildi!":"Sevk Kaydedildi!"}</div>

    {tab==="yeni"&&<div style={{flex:1,display:"flex",overflow:"hidden"}}>

/* ═══ MÜDÜR ONAY + FİYATLANDIRMA EKRANI ═══ */
function SevkOnay({goBack,data,setData,user}){
  const bekleyenler=(data.ltd.sevkBekleyen||[]).filter(s=>s.durum==="bekliyor");
  const onaylananlar=(data.ltd.sevkler||[]).filter(s=>s.hedefTip==="dis");
  const[aktif,setAktif]=useState(null);/* aktif sevk id */
  const[fiyatlar,setFiyatlar]=useState({});/* {kalemId: fiyat} */
  const firmalar=loadFirmalar();

  const onayla=(sevkId)=>{
    const sevk=bekleyenler.find(s=>s.id===sevkId);if(!sevk)return;
    const kalemlerFiyatli=sevk.kalemler.map(k=>({...k,birimFiyat:Number(fiyatlar[k.id])||0,toplamFiyat:(Number(fiyatlar[k.id])||0)*k.adet}));
    const topTutar=kalemlerFiyatli.reduce((s,k)=>s+k.toplamFiyat,0);
    /* Firma fiyat hafızası güncelle */
    const mevcutFirmalar=loadFirmalar();
    const firmaIdx=mevcutFirmalar.findIndex(f=>f.ad===sevk.hedef);
    const firmaFiyatlar={};kalemlerFiyatli.forEach(k=>{firmaFiyatlar[k.id]=k.birimFiyat;});
    if(firmaIdx>=0){mevcutFirmalar[firmaIdx].fiyatlar={...(mevcutFirmalar[firmaIdx].fiyatlar||{}),...firmaFiyatlar};}
    else{mevcutFirmalar.push({ad:sevk.hedef,fiyatlar:firmaFiyatlar});}
    saveFirmalar(mevcutFirmalar);

    setData(prev=>{const nd=JSON.parse(JSON.stringify(prev));
      /* Bekleyenden kaldır */
      nd.ltd.sevkBekleyen=(nd.ltd.sevkBekleyen||[]).map(s=>s.id===sevkId?{...s,durum:"onaylandi"}:s);
      /* Sevklere ekle */
      if(!nd.ltd.sevkler)nd.ltd.sevkler=[];
      nd.ltd.sevkler.push({...sevk,kalemler:kalemlerFiyatli,topTutar,durum:"onaylandi",onaylayan:user?.name,onayTarih:new Date().toISOString()});
      /* Cari hesaba borç yaz */
      if(!nd.ltd.cariler)nd.ltd.cariler=[];
      nd.ltd.cariler.push({id:nid(),firma:sevk.hedef,tip:"borc",tutar:topTutar,tarih:new Date().toISOString().split("T")[0],aciklama:`Sevk #${sevk.id} — ${sevk.topAdet} ürün`,sevkId:sevk.id});
      return nd;
    });
    setAktif(null);setFiyatlar({});
  };

  /* Firma hafızasından fiyat yükle */
  const firmaFiyatYukle=(firmaAd,kalemler)=>{
    const firma=firmalar.find(f=>f.ad===firmaAd);
    if(!firma||!firma.fiyatlar)return;
    const yeni={};kalemler.forEach(k=>{if(firma.fiyatlar[k.id])yeni[k.id]=firma.fiyatlar[k.id];});
    setFiyatlar(prev=>({...prev,...yeni}));
  };

  return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style>
    <Header title="Sevk Onay & Fiyatlandırma" onBack={goBack} onHome={goBack}/>
    <div style={{flex:1,overflow:"auto",padding:"10px 14px"}}>
      {bekleyenler.length===0&&<div style={{textAlign:"center",padding:30,color:D.t3}}><div style={{fontSize:36,marginBottom:8}}>✅</div>Onay bekleyen sevk yok</div>}
      {bekleyenler.map(s=><div key={s.id} className="fu" style={{background:D.w,borderRadius:14,padding:"12px 14px",boxShadow:D.s2,marginBottom:10,border:aktif===s.id?`2px solid ${D.blue}`:`1px solid ${D.blueBd}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div><div style={{fontWeight:700,fontSize:13}}>🏢 → {s.hedef}</div><div style={{fontSize:9,color:D.t3}}>{s.tarih} {s.saat} • {s.personel}{s.not?` • ${s.not}`:""}</div></div>
          <span style={{fontSize:10,background:"rgba(232,155,28,0.1)",color:D.o,padding:"3px 8px",borderRadius:6,fontWeight:700}}>⏳ Onay Bekliyor</span>
        </div>
        {aktif!==s.id&&<button onClick={()=>{setAktif(s.id);firmaFiyatYukle(s.hedef,s.kalemler);}} className="tap" style={{width:"100%",padding:10,borderRadius:10,border:`1.5px solid ${D.blue}`,background:D.blueMi,cursor:"pointer",fontWeight:700,fontSize:12,color:D.blue,fontFamily:D.f}}>💰 Fiyatlandır & Onayla</button>}
        {aktif===s.id&&<div style={{marginTop:8}}>
          {s.kalemler.map(k=>{const firmaFiyat=firmalar.find(f=>f.ad===s.hedef)?.fiyatlar?.[k.id];
            return<div key={k.id} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",borderBottom:`1px solid ${D.blueGh}`}}>
            <div style={{flex:1}}><div style={{fontSize:11,fontWeight:600}}>{k.adet}× {k.ad}</div>
              {firmaFiyat&&<div style={{fontSize:8,color:D.t3}}>Son fiyat: ₺{firmaFiyat}</div>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:3}}>
              <span style={{fontSize:10,color:D.t3}}>₺</span>
              <input type="number" inputMode="decimal" value={fiyatlar[k.id]||""} onChange={e=>setFiyatlar({...fiyatlar,[k.id]:e.target.value})} placeholder={firmaFiyat||"Fiyat"} style={{width:70,padding:"6px 8px",fontSize:13,fontWeight:700,fontFamily:D.fd,textAlign:"right"}}/>
              <span style={{fontSize:9,color:D.t3}}>/{k.birim}</span>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:D.blue,fontFamily:D.fd,minWidth:60,textAlign:"right"}}>{fiyatlar[k.id]?fmtTL(Number(fiyatlar[k.id])*k.adet):"—"}</div>
          </div>;})}
          <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",fontWeight:800,fontSize:14}}>
            <span>Toplam</span>
            <span style={{color:D.blue,fontFamily:D.fd}}>{fmtTL(s.kalemler.reduce((t,k)=>t+(Number(fiyatlar[k.id])||0)*k.adet,0))}</span>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>{setAktif(null);setFiyatlar({});}} className="tap" style={{flex:1,padding:10,borderRadius:10,border:"none",background:D.rS,cursor:"pointer",fontWeight:700,fontSize:12,color:D.r,fontFamily:D.f}}>İptal</button>
            <button onClick={()=>onayla(s.id)} className="tap" style={{flex:2,padding:10,borderRadius:10,border:"none",background:D.g,cursor:"pointer",fontWeight:700,fontSize:12,color:D.w,fontFamily:D.f}}>✓ Onayla & Faturala</button>
          </div>
        </div>}
      </div>)}

      {onaylananlar.length>0&&<div style={{marginTop:16}}>
        <div style={{fontSize:12,fontWeight:700,color:D.t2,marginBottom:6}}>✅ Onaylanan Dış Sevkler</div>
        {onaylananlar.slice(-5).reverse().map(s=><div key={s.id} style={{background:D.gS,borderRadius:10,padding:"8px 10px",marginBottom:4,display:"flex",justifyContent:"space-between",fontSize:10}}>
          <span>→ {s.hedef} • {s.topAdet} ürün • {s.onaylayan}</span>
          <span style={{fontWeight:700,color:D.g,fontFamily:D.fd}}>{fmtTL(s.topTutar||0)}</span>
        </div>)}
      </div>}
    </div>
  </div>;
}

function MasaPOS({goBack,data,setData,user}){
  const co="ltd";const sube="Meydan";
  const[masalar,setMasalar]=useState(()=>{try{const s=localStorage.getItem("bardaks_masalar");return s?JSON.parse(s):{};}catch(e){return{};}});
  const[aktifMasa,setAktifMasa]=useState(null);
  const[cat,setCat]=useState("kahve");
  const[odemeModal,setOdemeModal]=useState(null);/* {masaNo,toplam} */
  const[nakitPay,setNakitPay]=useState("");
  const[musteriEkran,setMusteriEkran]=useState(false);

  useEffect(()=>{try{localStorage.setItem("bardaks_masalar",JSON.stringify(masalar));}catch(e){}},[masalar]);

  const masaKalemler=(no)=>masalar[no]||[];
  const masaToplam=(no)=>(masalar[no]||[]).reduce((s,k)=>s+k.p*k.q,0);
  const doluMasaSayisi=Object.keys(masalar).filter(k=>masalar[k].length>0).length;

  const addItem=(masaNo,p)=>{
    const mk=[...(masalar[masaNo]||[])];
    const e=mk.find(k=>k.id===p.id);
    if(e)e.q++;else mk.push({...p,q:1});
    setMasalar({...masalar,[masaNo]:mk});
  };
  const removeItem=(masaNo,pid)=>{
    let mk=[...(masalar[masaNo]||[])];
    const e=mk.find(k=>k.id===pid);
    if(!e)return;if(e.q<=1)mk=mk.filter(k=>k.id!==pid);else e.q--;
    setMasalar({...masalar,[masaNo]:mk});
  };
  const iptalMasa=(masaNo)=>{const nm={...masalar};delete nm[masaNo];setMasalar(nm);setAktifMasa(null);};

  /* ═══ PARÇALI ÖDEME ═══ */
  const tahsilEt=(masaNo)=>{
    const toplam=masaToplam(masaNo);
    if(toplam<=0)return;
    setOdemeModal({masaNo,toplam});setNakitPay("");
  };
  const odemeOnayla=()=>{
    if(!odemeModal)return;
    const{masaNo,toplam}=odemeModal;
    const nakit=Number(nakitPay)||0;
    const kart=toplam-nakit;
    const satis={id:nid(),sube,tarih:new Date().toISOString(),tip:nakit>0&&kart>0?"parcali":nakit>0?"nakit":"kart",tutar:toplam,nakit,kart,masaNo,kalemler:(masalar[masaNo]||[]).map(k=>({ad:k.n,adet:k.q,fiyat:k.p})),personel:user?.name||"?"};
    setData(prev=>{const nd=JSON.parse(JSON.stringify(prev));if(!nd[co].anlikSatislar)nd[co].anlikSatislar=[];nd[co].anlikSatislar.push(satis);return nd;});
    const nm={...masalar};delete nm[masaNo];setMasalar(nm);
    setOdemeModal(null);setAktifMasa(null);
  };

  const prods=PRODS.filter(p=>p.c===cat);

  /* ═══ MÜŞTERİ EKRANI ═══ */
  if(musteriEkran&&aktifMasa){
    const kalemler=masaKalemler(aktifMasa);const toplam=masaToplam(aktifMasa);
    return<div style={{height:"100vh",background:"#0a0a0a",color:"#fff",fontFamily:D.f,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"20px 24px",textAlign:"center",borderBottom:"1px solid #333"}}>
        <div style={{fontSize:12,opacity:.5}}>bardak's — Meydan</div>
        <div style={{fontSize:16,fontWeight:700,marginTop:4}}>Masa {aktifMasa}</div>
      </div>
      <div style={{flex:1,overflow:"auto",padding:16}}>
        {kalemler.map((k,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"12px 0",borderBottom:"1px solid #222",fontSize:14}}>
          <span>{k.q}× {k.n}</span><span style={{fontWeight:700,fontFamily:D.fd}}>₺{k.p*k.q}</span>
        </div>)}
      </div>
      <div style={{padding:"20px 24px",borderTop:"1px solid #333",textAlign:"center"}}>
        <div style={{fontSize:12,opacity:.5}}>Toplam</div>
        <div style={{fontSize:36,fontWeight:800,fontFamily:D.fd,color:"#4ade80"}}>₺{fmt(toplam)}</div>
      </div>
      <button onClick={()=>setMusteriEkran(false)} style={{padding:10,border:"none",background:"#333",color:"#aaa",fontSize:10,cursor:"pointer"}}>Personel Ekranına Dön</button>
    </div>;
  }

  /* ═══ ÖDEME MODALI ═══ */
  if(odemeModal){
    const{masaNo,toplam}=odemeModal;
    const nakit=Number(nakitPay)||0;
    const kart=Math.max(0,toplam-nakit);
    return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style>
      <Header title={`Masa ${masaNo} — Ödeme`} onBack={()=>setOdemeModal(null)} onHome={()=>setOdemeModal(null)}/>
      <div style={{flex:1,overflow:"auto",padding:16}}>
        <div className="fu" style={{background:`linear-gradient(135deg,${D.blue},${D.blueDk})`,borderRadius:16,padding:18,color:D.w,textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:11,opacity:.6}}>Hesap Toplamı</div>
          <div style={{fontSize:32,fontWeight:800,fontFamily:D.fd}}>{fmtTL(toplam)}</div>
        </div>
        <div className="fu" style={{background:D.w,borderRadius:14,padding:16,boxShadow:D.s2,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Parçalı Ödeme</div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,fontWeight:600,color:D.t2,display:"block",marginBottom:4}}>Nakit Ödenecek (₺)</label>
            <input type="number" inputMode="numeric" value={nakitPay} onChange={e=>{const v=Math.min(Number(e.target.value)||0,toplam);setNakitPay(v||"");}} placeholder="0 = Tamamı Kart" style={{fontSize:18,fontWeight:700,fontFamily:D.fd,textAlign:"center"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div style={{background:D.gS,borderRadius:10,padding:12,textAlign:"center"}}><div style={{fontSize:10,color:D.t3}}>💵 Nakit</div><div style={{fontSize:18,fontWeight:800,color:D.g,fontFamily:D.fd}}>{fmtTL(nakit)}</div></div>
            <div style={{background:D.blueMi,borderRadius:10,padding:12,textAlign:"center"}}><div style={{fontSize:10,color:D.t3}}>💳 Kart</div><div style={{fontSize:18,fontWeight:800,color:D.blue,fontFamily:D.fd}}>{fmtTL(kart)}</div></div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:16}}>
          <button onClick={()=>setNakitPay(toplam)} className="tap" style={{padding:10,borderRadius:10,border:`1.5px solid ${D.g}`,background:D.gS,cursor:"pointer",fontWeight:700,fontSize:12,color:D.g,fontFamily:D.f}}>%100 Nakit</button>
          <button onClick={()=>setNakitPay(Math.round(toplam/2))} className="tap" style={{padding:10,borderRadius:10,border:`1.5px solid ${D.o}`,background:"rgba(232,155,28,0.06)",cursor:"pointer",fontWeight:700,fontSize:12,color:D.o,fontFamily:D.f}}>50/50</button>
          <button onClick={()=>setNakitPay("")} className="tap" style={{padding:10,borderRadius:10,border:`1.5px solid ${D.blue}`,background:D.blueMi,cursor:"pointer",fontWeight:700,fontSize:12,color:D.blue,fontFamily:D.f}}>%100 Kart</button>
        </div>
        <button onClick={odemeOnayla} className="tap" style={{width:"100%",padding:16,borderRadius:14,border:"none",background:D.g,color:D.w,fontSize:16,fontWeight:800,cursor:"pointer",fontFamily:D.f}}>✓ Tahsil Et</button>
      </div>
    </div>;
  }

  /* ═══ SİPARİŞ EKRANI (Masa seçili) ═══ */
  if(aktifMasa){
    const kalemler=masaKalemler(aktifMasa);const toplam=masaToplam(aktifMasa);
    return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style>
      <Header title={`Masa ${aktifMasa} — Sipariş`} onBack={()=>setAktifMasa(null)} onHome={()=>setAktifMasa(null)}/>
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",gap:5,padding:"8px 12px",flexWrap:"wrap"}}>{CATS.map(c=>{const ac=cat===c.id;return<button key={c.id} onClick={()=>setCat(c.id)} className="tap" style={{display:"flex",alignItems:"center",gap:4,padding:"5px 9px 5px 5px",borderRadius:50,border:"none",cursor:"pointer",background:ac?D.blue:D.w,boxShadow:D.s1}}><Img src={A[c.a]} size={20} round/><span style={{fontSize:10,fontWeight:600,color:ac?D.w:D.t}}>{c.n}</span></button>;})}</div>
          <div style={{flex:1,overflow:"auto",padding:"3px 12px 12px"}}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:5}}>{prods.map(p=>{const ic=kalemler.find(k=>k.id===p.id);return<button key={p.id} onClick={()=>addItem(aktifMasa,p)} className="tap" style={{background:D.w,borderRadius:10,border:ic?`2px solid ${D.blue}`:`1px solid ${D.blueBd}`,padding:"8px 6px 6px",cursor:"pointer",textAlign:"left",position:"relative",boxShadow:D.s1}}>{ic&&<div style={{position:"absolute",top:3,right:3,width:16,height:16,borderRadius:8,background:D.blue,color:D.w,fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{ic.q}</div>}<div style={{fontSize:10,fontWeight:600}}>{p.n}</div><div style={{fontSize:12,fontWeight:800,color:D.blue,fontFamily:D.fd}}>₺{p.p}</div></button>;})}</div></div>
        </div>
        <div style={{width:210,background:D.w,borderLeft:`1px solid ${D.blueBd}`,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"8px 10px",borderBottom:`1px solid ${D.blueBd}`,fontWeight:700,fontSize:12}}>Masa {aktifMasa}</div>
          <div style={{flex:1,overflow:"auto"}}>{kalemler.map(k=><div key={k.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 10px",borderBottom:`1px solid ${D.blueGh}`,fontSize:10}}>
            <div style={{display:"flex",alignItems:"center",gap:3}}><button onClick={()=>removeItem(aktifMasa,k.id)} className="tap" style={{width:16,height:16,borderRadius:8,border:"none",background:D.rS,color:D.r,fontSize:9,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button><span>{k.q}× {k.n}</span></div>
            <span style={{fontWeight:700,fontFamily:D.fd}}>₺{k.p*k.q}</span>
          </div>)}</div>
          {toplam>0&&<div style={{padding:"8px 10px",borderTop:`1px solid ${D.blueBd}`,background:D.ivory}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontWeight:600,fontSize:11}}>Toplam</span><span style={{fontSize:16,fontWeight:800,color:D.blue,fontFamily:D.fd}}>₺{fmt(toplam)}</span></div>
            <button onClick={()=>tahsilEt(aktifMasa)} className="tap" style={{width:"100%",padding:8,borderRadius:8,border:"none",background:D.g,color:D.w,fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:D.f,marginBottom:4}}>💰 Hesabı Kapat</button>
            <div style={{display:"flex",gap:4}}>
              <button onClick={()=>setMusteriEkran(true)} className="tap" style={{flex:1,padding:5,borderRadius:6,border:`1px solid ${D.blueBd}`,background:D.w,cursor:"pointer",fontSize:8,fontWeight:600,color:D.blue,fontFamily:D.f}}>👁 Müşteri</button>
              <button onClick={()=>iptalMasa(aktifMasa)} className="tap" style={{flex:1,padding:5,borderRadius:6,border:"none",background:D.rS,cursor:"pointer",fontSize:8,fontWeight:600,color:D.r,fontFamily:D.f}}>İptal</button>
            </div>
          </div>}
        </div>
      </div>
    </div>;
  }

  /* ═══ MASA SEÇİM EKRANI ═══ */
  return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style>
    <Header title="Meydan — Masalar" onBack={goBack} onHome={goBack}/>
    <div style={{padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontSize:12,fontWeight:600,color:D.t2}}>👤 {user?.name} • {doluMasaSayisi} masa dolu</div>
    </div>
    <div style={{flex:1,overflow:"auto",padding:"6px 14px 14px"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:8}}>
        {Array.from({length:MASA_SAYISI},(_, i)=>i+1).map(no=>{
          const kalem=masaKalemler(no);const top=masaToplam(no);const dolu=kalem.length>0;
          return<button key={no} onClick={()=>setAktifMasa(no)} className="tap fu" style={{background:dolu?`linear-gradient(135deg,${D.blue},${D.blueDk})`:D.w,borderRadius:14,border:dolu?"none":`2px dashed ${D.blueBd}`,padding:"14px 10px",cursor:"pointer",textAlign:"center",boxShadow:dolu?D.s2:D.s1,color:dolu?D.w:D.t,animationDelay:no*.02+"s"}}>
            <div style={{fontSize:20,fontWeight:800,fontFamily:D.fd}}>{no}</div>
            <div style={{fontSize:9,opacity:.7,marginTop:2}}>{dolu?`${kalem.length} ürün`:"Boş"}</div>
            {dolu&&<div style={{fontSize:12,fontWeight:800,fontFamily:D.fd,marginTop:4}}>₺{fmt(top)}</div>}
          </button>;
        })}
      </div>
    </div>
  </div>;
}

/* ═══ ŞUBE KONTROL PANELİ ═══ */
function SubePanel({branch,companyId,data,setData,goBack,goPos,goZ,user}){
  const co=companyId;const d=data[co];const bName=branch.name;
  const update=(key,val)=>{const nd={...data,[co]:{...d,[key]:val}};setData(nd);};
  const personel=(d.personel||[]).filter(p=>p.sube===bName);
  const kiralar=(d.kiralar||[]).filter(k=>(k.yer||"").includes(bName)||(k.sube||"")===bName);
  const faturalar=(d.faturalar||[]).filter(f=>(f.sube||"")===bName);
  /* Hesaplama sabitleri */
  const ASGARI_BRUT=33030;const SGK_ISCIPAY=0.14;const SGK_ISSIZ_ISCI=0.01;const SGK_ISVEREN=0.155;const SGK_ISSIZ_ISVEREN=0.02;const DAMGA=0.00759;
  const ASGARI_GV_ISTISNA=ASGARI_BRUT*(1-SGK_ISCIPAY-SGK_ISSIZ_ISCI);const ASGARI_DAMGA_ISTISNA=ASGARI_BRUT;
  const GV_DILIM=[{limit:190000,oran:0.15},{limit:400000,oran:0.20},{limit:1500000,oran:0.27},{limit:5300000,oran:0.35},{limit:Infinity,oran:0.40}];
  const gvH=(m)=>{if(m<=0)return 0;let v=0,k=m,p=0;for(const dd of GV_DILIM){const g=dd.limit===Infinity?k:dd.limit-p;const t=Math.min(k,g);v+=t*dd.oran;k-=t;p=dd.limit;if(k<=0)break;}return v;};
  const hesapla=(net)=>{let b=net*1.42;for(let i=0;i<50;i++){const s=b*SGK_ISCIPAY;const is=b*SGK_ISSIZ_ISCI;const gm=b-s-is;const vt=Math.max(0,gm-ASGARI_GV_ISTISNA);const gv=gvH(vt)-gvH(0);const dm=Math.max(0,b-ASGARI_DAMGA_ISTISNA)*DAMGA;const hn=b-s-is-gv-dm;const f=net-hn;if(Math.abs(f)<0.5)break;b+=f*0.8;}b=Math.round(b);return{brut:b,sgkIsveren:Math.round(b*SGK_ISVEREN),issizIsveren:Math.round(b*SGK_ISSIZ_ISVEREN),isverenToplam:Math.round(b*SGK_ISVEREN)+Math.round(b*SGK_ISSIZ_ISVEREN)};};
  /* Personel hesapları — SGK MANUEL, BRÜT = NET + SGK */
  const pCalc=personel.map(p=>{const yemek=p.yemekAy||((p.yemekGun||330)*(p.calGun||26));const sgkM=p.sgk||0;const brutH=p.net+sgkM;return{...p,brut:brutH,sgkManuel:sgkM,isverenToplam:sgkM,yemekAy:yemek,topKisi:brutH+(p.prim||0)+yemek};});
  const topPNet=pCalc.reduce((s,p)=>s+p.net,0);const topPSGK=pCalc.reduce((s,p)=>s+p.sgkManuel,0);
  const topPYemek=pCalc.reduce((s,p)=>s+p.yemekAy,0);const topPPrim=pCalc.reduce((s,p)=>s+(p.prim||0),0);
  const topPMaliyet=pCalc.reduce((s,p)=>s+p.topKisi,0);
  /* Kira hesapları — stopajVar + periyod destekli */
  const topKiraNet=kiralar.reduce((s,k)=>s+((k.periyod||"aylik")==="yillik"?Math.round(k.net/12):k.net),0);
  const topStopaj=kiralar.reduce((s,k)=>{const an=(k.periyod||"aylik")==="yillik"?Math.round(k.net/12):k.net;return s+(k.stopajVar!==false?Math.round(an*0.25):0);},0);
  /* Fatura hesapları */
  const topFatura=faturalar.reduce((s,f)=>s+f.tutar,0);/* KDV dahil toplam */
  const topKDV=faturalar.reduce((s,f)=>s+kdvAyirGlobal(f.tutar,f.kdvOran||0).kdv,0);
  const bekleyen=faturalar.filter(f=>f.durum!=="odendi").length;
  /* Toplam şube gideri */
  const topSube=topPMaliyet+topKiraNet+topFatura;

  return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style>
    <Header title={bName+" Kontrol Paneli"} crumbs={(co==="ltd"?"Limited":"Şahıs")+" › "+bName} onBack={goBack} onHome={goBack}/>
    <div style={{flex:1,overflow:"auto",padding:14}}>

    {/* ═══ ŞUBE ÖZET BANNER ═══ */}
    <div className="fu" style={{background:`linear-gradient(135deg,${D.blue},${D.blueDk})`,borderRadius:16,padding:14,marginBottom:10,color:D.w}}>
      <div style={{fontSize:10,opacity:.7}}>🏪 {bName} — Aylık Toplam Gider</div>
      <div style={{fontSize:22,fontWeight:800,fontFamily:D.fd,marginTop:4}}>{fmtTL(topSube)}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4,marginTop:8}}>
        <div><div style={{fontSize:7,opacity:.5}}>Personel</div><div style={{fontSize:11,fontWeight:700}}>{fmtTL(topPMaliyet)}</div></div>
        <div><div style={{fontSize:7,opacity:.5}}>Kira</div><div style={{fontSize:11,fontWeight:700}}>{fmtTL(topKiraNet)}</div></div>
        <div><div style={{fontSize:7,opacity:.5}}>Fatura (KDV dahil)</div><div style={{fontSize:11,fontWeight:700}}>{fmtTL(topFatura)}</div></div>
        <div><div style={{fontSize:7,opacity:.5}}>KDV İade</div><div style={{fontSize:11,fontWeight:700,color:"#4ade80"}}>{fmtTL(topKDV)}</div></div>
      </div>
    </div>

    {/* ═══ HIZLI ERİŞİM BUTONLARI ═══ */}
    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
      <button onClick={goPos} className="tap" style={{flex:1,padding:"10px 8px",borderRadius:12,border:`1.5px solid ${D.blueBd}`,background:D.w,cursor:"pointer",fontFamily:D.f,fontWeight:700,fontSize:12,color:D.blue}}>☕ Satış/POS</button>
      {user.role==="patron"&&<button onClick={goZ} className="tap" style={{flex:1,padding:"10px 8px",borderRadius:12,border:`1.5px solid ${D.blueBd}`,background:D.w,cursor:"pointer",fontFamily:D.f,fontWeight:700,fontSize:12,color:D.blue}}>📷 Kasa Kapat</button>}
      {bName==="İmalathane"&&(user.role==="patron"||user.role==="mudur")&&<button onClick={()=>goPos("sevkonay")} className="tap" style={{flex:1,padding:"10px 8px",borderRadius:12,border:`1.5px solid ${D.o}`,background:"rgba(232,155,28,0.06)",cursor:"pointer",fontFamily:D.f,fontWeight:700,fontSize:12,color:D.o}}>💰 Sevk Onay {(d.sevkBekleyen||[]).filter(s=>s.durum==="bekliyor").length>0?`(${(d.sevkBekleyen||[]).filter(s=>s.durum==="bekliyor").length})`:""}</button>}
    </div>

    {/* ═══ GELEN MALLAR (İMALATHANEDEN) ═══ */}
    {(()=>{
      const coId=companyId;const mk=(d.malKabul||[]).filter(m=>m.hedef===bName);
      const bekleyen=mk.filter(m=>m.durum==="teslim");
      const kabul=mk.filter(m=>m.durum==="kabul");
      if(mk.length===0)return null;
      const kabulEt=(sevkId)=>{update("malKabul",(d.malKabul||[]).map(m=>m.id===sevkId?{...m,durum:"kabul",kabulTarih:new Date().toISOString().split("T")[0],kabulEden:user?.name}:m));};
      return<div style={{marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>📦 İmalattan Gelen ({bekleyen.length} bekliyor)</div>
        {bekleyen.map(m=><div key={m.id} className="fu" style={{background:D.w,borderRadius:12,padding:"10px 12px",boxShadow:D.s1,marginBottom:6,border:`2px solid ${D.o}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div><span style={{fontWeight:700,fontSize:11}}>🚚 İmalathane → {m.hedef}</span><span style={{fontSize:8,color:D.t3,marginLeft:6}}>{m.tarih} {m.saat}</span></div>
            <span style={{fontSize:9,color:D.o,fontWeight:600}}>⏳ Teslim Edildi</span>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>{m.kalemler.map((k,j)=><span key={j} style={{fontSize:9,background:D.blueMi,padding:"2px 6px",borderRadius:4,fontWeight:600}}>{k.adet}× {k.ad}</span>)}</div>
          <button onClick={()=>kabulEt(m.id)} className="tap" style={{width:"100%",padding:8,borderRadius:8,border:"none",background:D.g,color:D.w,fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:D.f}}>✓ Kabul Et — Rafa Koydum</button>
        </div>)}
        {kabul.length>0&&<div style={{fontSize:9,color:D.t3,marginTop:4}}>{kabul.length} ürün grubu kabul edildi ✓</div>}
      </div>;
    })()}

    {/* ═══ PERSONEL ═══ */}
    <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>👥 Personel ({personel.length} kişi) — {fmtTL(topPMaliyet)}</div>
    {pCalc.map((p,i)=><div key={p.id} className="fu" style={{background:D.w,borderRadius:12,padding:"9px 11px",boxShadow:D.s1,marginBottom:6,border:`1px solid ${D.blueBd}`,animationDelay:i*.03+"s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
        <div style={{fontWeight:700,fontSize:12}}>{p.ad}{p.partTime&&<span style={{fontSize:7,background:D.o,color:D.w,padding:"1px 4px",borderRadius:3,marginLeft:3}}>PT</span>}</div>
        <span style={{fontWeight:800,fontSize:12,color:D.blue,fontFamily:D.fd}}>{fmtTL(p.topKisi)}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:3}}>
        <div style={{background:D.blueMi,borderRadius:6,padding:"3px 6px"}}><div style={{fontSize:7,color:D.t3}}>Net</div><div style={{fontSize:10,fontWeight:600}}><InlineEdit value={p.net} type="number" fmt={fmtTL} onSave={v=>{update("personel",(d.personel||[]).map(x=>x.id===p.id?{...x,net:v}:x));}}/></div></div>
        <div style={{background:D.rS,borderRadius:6,padding:"3px 6px"}}><div style={{fontSize:7,color:D.t3}}>SGK</div><div style={{fontSize:10,fontWeight:600,color:D.r}}><InlineEdit value={p.sgkManuel} type="number" fmt={fmtTL} onSave={v=>{update("personel",(d.personel||[]).map(x=>x.id===p.id?{...x,sgk:v}:x));}}/></div></div>
        <div style={{background:"rgba(232,155,28,0.06)",borderRadius:6,padding:"3px 6px"}}><div style={{fontSize:7,color:D.t3}}>Yemek</div><div style={{fontSize:10,fontWeight:600,color:D.o}}><InlineEdit value={p.yemekAy} type="number" fmt={fmtTL} onSave={v=>{update("personel",(d.personel||[]).map(x=>x.id===p.id?{...x,yemekAy:v}:x));}}/></div></div>
        <div style={{background:p.prim?D.gS:D.blueGh,borderRadius:6,padding:"3px 6px"}}><div style={{fontSize:7,color:D.t3}}>Prim</div><div style={{fontSize:10,fontWeight:600,color:p.prim?D.g:D.t3}}><InlineEdit value={p.prim||0} type="number" fmt={v=>v?fmtTL(v):"—"} onSave={v=>{update("personel",(d.personel||[]).map(x=>x.id===p.id?{...x,prim:v}:x));}}/></div></div>
      </div>
      <div style={{fontSize:8,color:D.t2,marginTop:2}}>Brüt (Net+SGK): <strong>{fmtTL(p.brut)}</strong> | Yemek: {Math.round(p.yemekAy/(p.calGun||26))} ₺/gün</div>
    </div>)}
    {personel.length===0&&<div style={{padding:12,textAlign:"center",fontSize:11,color:D.t3,background:D.w,borderRadius:10,marginBottom:8}}>Bu şubede personel yok</div>}

    {/* ═══ KİRALAR ═══ */}
    <div style={{fontWeight:700,fontSize:13,marginBottom:6,marginTop:6}}>🏠 Kiralar — {fmtTL(topKiraNet)}</div>
    {kiralar.map(k=>{const sVar=k.stopajVar!==false;const per=k.periyod||"aylik";const aylikNet=per==="yillik"?Math.round(k.net/12):k.net;const brut=sVar?Math.round(aylikNet/0.80):aylikNet;const stopaj=sVar?(brut-aylikNet):0;const yillikNet=per==="yillik"?k.net:k.net*12;
    return<div key={k.id} className="fu" style={{background:D.w,borderRadius:12,padding:"9px 11px",boxShadow:D.s1,marginBottom:6,border:`1px solid ${D.blueBd}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
        <div style={{fontWeight:700,fontSize:12}}>{k.yer}
          <span style={{fontSize:7,background:sVar?D.rS:D.gS,color:sVar?D.r:D.g,padding:"1px 4px",borderRadius:3,marginLeft:4}}>{sVar?"STOPAJLI":"STOPAJSIZ"}</span>
          <span style={{fontSize:7,background:per==="yillik"?"rgba(168,85,247,0.12)":D.blueMi,color:per==="yillik"?"#7c3aed":D.blue,padding:"1px 4px",borderRadius:3,marginLeft:3}}>{per==="yillik"?"YILLIK":"AYLIK"}</span>
        </div>
        <div style={{display:"flex",gap:3}}>
          <button onClick={()=>{update("kiralar",(d.kiralar||[]).map(x=>x.id===k.id?{...x,periyod:per==="yillik"?"aylik":"yillik"}:x));}} className="tap" style={{padding:"2px 6px",borderRadius:5,border:"none",background:D.blueMi,cursor:"pointer",fontSize:7,fontWeight:600,color:D.blue}}>{per==="yillik"?"→Aylık":"→Yıllık"}</button>
          <button onClick={()=>{update("kiralar",(d.kiralar||[]).map(x=>x.id===k.id?{...x,stopajVar:!sVar}:x));}} className="tap" style={{padding:"2px 6px",borderRadius:5,border:"none",background:sVar?D.gS:D.rS,cursor:"pointer",fontSize:7,fontWeight:600,color:sVar?D.g:D.r}}>{sVar?"Stopaj Kaldır":"Stopaj Ekle"}</button>
          <button onClick={()=>delKira(k.id)} className="tap" style={{padding:2,borderRadius:5,border:"none",background:D.rS,cursor:"pointer"}}><Ic.Trash s={10} c={D.r}/></button>
        </div>
      </div>
      {/* Girdiğin tutar */}
      <div style={{background:D.blueMi,borderRadius:6,padding:"4px 8px",marginBottom:3}}>
        <div style={{fontSize:7,color:D.t3}}>Girdiğin ({per==="yillik"?"yıllık":"aylık"}) Kira</div>
        <div style={{fontSize:12,fontWeight:700}}><InlineEdit value={k.net} type="number" fmt={fmtTL} onSave={v=>{const log=[...(k.artisLog||[])];if(v!==k.net)log.push({tarih:TODAY.toISOString().split("T")[0],eskiNet:k.net,yeniNet:v});update("kiralar",(d.kiralar||[]).map(x=>x.id===k.id?{...x,net:v,artisLog:log}:x));}}/></div>
      </div>
      {/* Aylık eşdeğer + Stopaj (varsa) */}
      <div style={{display:"grid",gridTemplateColumns:sVar?"1fr 1fr 1fr":"1fr 1fr",gap:3}}>
        <div style={{background:D.blueGh,borderRadius:6,padding:"3px 6px"}}><div style={{fontSize:7,color:D.t3}}>Aylık Gider</div><div style={{fontSize:11,fontWeight:700,color:D.blue}}>{fmtTL(aylikNet)}</div></div>
        {sVar&&<div style={{background:D.blueGh,borderRadius:6,padding:"3px 6px"}}><div style={{fontSize:7,color:D.t3}}>Aylık Brüt</div><div style={{fontSize:10,fontWeight:600}}>{fmtTL(brut)}</div></div>}
        {sVar&&<div style={{background:D.rS,borderRadius:6,padding:"3px 6px"}}><div style={{fontSize:7,color:D.t3}}>Aylık Stopaj</div><div style={{fontSize:10,fontWeight:600,color:D.r}}>{fmtTL(stopaj)}</div></div>}
        <div style={{background:"rgba(168,85,247,0.06)",borderRadius:6,padding:"3px 6px"}}><div style={{fontSize:7,color:D.t3}}>Yıllık Toplam</div><div style={{fontSize:10,fontWeight:700,color:"#7c3aed"}}>{fmtTL(yillikNet)}</div></div>
      </div>
      {sVar&&<div style={{fontSize:8,color:D.r,marginTop:2}}>⚠️ Aylık {fmtTL(aylikNet)} ödeme → Stopaj {fmtTL(stopaj)}/ay • Yıllık stopaj {fmtTL(stopaj*12)}</div>}
    </div>;})}

/* ═══ PIN YÖNETİM PANELİ ═══ */
function PinYonetim({user,onClose}){
  const[pins,setPins]=useState(loadPins);
  const[msg,setMsg]=useState("");
  const isPatron=user.role==="patron";
  const currentPin=Object.entries(pins).find(([k,v])=>v.name===user.name)?.[0]||"";

  const changePinFor=(eskiPin,yeniPin)=>{
    if(yeniPin.length!==4||isNaN(yeniPin)){setMsg("⚠️ PIN 4 haneli rakam olmalı");return;}
    if(pins[yeniPin]&&yeniPin!==eskiPin){setMsg("⚠️ Bu PIN zaten kullanımda: "+pins[yeniPin].name);return;}
    const np={...pins};const userData=np[eskiPin];delete np[eskiPin];np[yeniPin]=userData;
    setPins(np);PINS=np;savePins(np);setMsg("✅ "+userData.name+" PIN'i değiştirildi: "+yeniPin);
  };

  const[editPin,setEditPin]=useState("");const[newPin,setNewPin]=useState("");

  return<div style={{background:D.w,borderRadius:16,padding:16,boxShadow:D.s2,border:`1px solid ${D.blueBd}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <h3 style={{fontSize:14,fontWeight:800,color:D.blue}}>🔐 PIN Yönetimi</h3>
      <button onClick={onClose} className="tap" style={{border:"none",background:D.rS,cursor:"pointer",width:28,height:28,borderRadius:14,fontSize:14,color:D.r,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
    </div>
    {msg&&<div className="fu" style={{padding:"8px 12px",borderRadius:8,marginBottom:10,background:msg.startsWith("✅")?D.gS:D.rS,fontSize:11,fontWeight:600,color:msg.startsWith("✅")?D.g:D.r}}>{msg}</div>}

    {/* Kendi PIN'ini Değiştir */}
    <div style={{background:D.blueMi,borderRadius:12,padding:12,marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:D.blue,marginBottom:6}}>Kendi PIN'ini Değiştir</div>
      <div style={{fontSize:10,color:D.t3,marginBottom:6}}>Mevcut: <strong style={{fontFamily:D.fd,color:D.blue}}>{currentPin}</strong> ({user.name})</div>
      <div style={{display:"flex",gap:6}}>
        <input type="tel" maxLength={4} pattern="[0-9]*" inputMode="numeric" placeholder="Yeni 4 haneli PIN" value={newPin} onChange={e=>setNewPin(e.target.value.replace(/\D/g,"").slice(0,4))} style={{flex:1,fontFamily:D.fd,fontSize:16,fontWeight:700,textAlign:"center",letterSpacing:8,padding:"8px 12px"}}/>
        <button onClick={()=>{if(currentPin&&newPin)changePinFor(currentPin,newPin);setNewPin("");}} className="tap" style={{padding:"8px 16px",borderRadius:10,border:"none",background:D.blue,color:D.w,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:D.f}}>Değiştir</button>
      </div>
    </div>

    {/* Patron: Tüm PIN'leri Yönet */}
    {isPatron&&<div>
      <div style={{fontSize:11,fontWeight:700,color:D.t2,marginBottom:6}}>Tüm Kullanıcılar</div>
      {Object.entries(pins).map(([pin,u])=><div key={pin} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:10,border:`1px solid ${D.blueBd}`,marginBottom:6,background:D.w}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:12}}>{u.name} <span style={{fontSize:8,background:u.role==="patron"?D.gS:u.role==="mudur"?D.blueMi:D.rS,color:u.role==="patron"?D.g:u.role==="mudur"?D.blue:D.r,padding:"1px 5px",borderRadius:3,fontWeight:600}}>{u.role==="patron"?"PATRON":u.role==="mudur"?"MÜDÜR":"PERSONEL"}</span></div>
          <div style={{fontSize:9,color:D.t3}}>{u.sube||"Tüm şubeler"} • PIN: <strong style={{fontFamily:D.fd,color:D.blue}}>{pin}</strong></div>
        </div>
        <input type="tel" maxLength={4} inputMode="numeric" placeholder="Yeni" value={editPin===pin?newPin:""} onFocus={()=>{setEditPin(pin);setNewPin("");}} onChange={e=>setNewPin(e.target.value.replace(/\D/g,"").slice(0,4))} style={{width:60,fontFamily:D.fd,fontSize:14,fontWeight:700,textAlign:"center",letterSpacing:4,padding:"6px 4px"}}/>
        <button onClick={()=>{if(editPin===pin&&newPin){changePinFor(pin,newPin);setEditPin("");setNewPin("");}}} className="tap" style={{padding:"6px 10px",borderRadius:8,border:"none",background:editPin===pin&&newPin.length===4?D.blue:D.blueMi,color:editPin===pin&&newPin.length===4?D.w:D.t3,fontWeight:700,fontSize:10,cursor:"pointer",fontFamily:D.f}}>OK</button>
      </div>)}
    </div>}

    {!isPatron&&<div style={{fontSize:10,color:D.t3,marginTop:8}}>💡 Diğer kullanıcıların PIN'lerini sadece Patron değiştirebilir.</div>}
  </div>;
}

  const kiraAy=[...(data.ltd.kiralar||[]),...(data.sahis.kiralar||[])].reduce((s,k)=>{const p=k.periyod||"aylik";return s+(p==="yillik"?Math.round((k.net||0)/12):(k.net||0));},0);
  const personelAy=[...(data.ltd.personel||[]),...(data.sahis.personel||[])].reduce((s,p)=>s+(p.net||0)+(p.sgk||0)+(p.prim||0)+(p.yemekAy||0),0);
  const topYuk=krediAy+kiraAy+personelAy;
  const likidite=kasaNakit+bankaAlacak+netCariAlacak-topYuk;
  const pozitif=likidite>=0;
  return<div className="fu" style={{background:pozitif?`linear-gradient(135deg,#065f46,#059669)`:`linear-gradient(135deg,#991b1b,#dc2626)`,borderRadius:18,padding:"16px 18px",color:D.w,boxShadow:D.s2,animationDelay:".06s"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontSize:10,opacity:.7}}>{pozitif?"✅":"⚠️"} Aylık Likidite Durumu</div>
      <div style={{fontSize:9,padding:"2px 8px",borderRadius:10,background:"rgba(255,255,255,0.15)",fontWeight:700}}>{pozitif?"POZİTİF":"NEGATİF"}</div>
    </div>
    <div style={{fontSize:26,fontWeight:800,fontFamily:D.fd,marginTop:4}}>{pozitif?"+":""}{fmtTL(likidite)}</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:8}}>
      <div><div style={{fontSize:8,opacity:.5}}>Kasadaki Nakit</div><div style={{fontSize:12,fontWeight:700,fontFamily:D.fd}}>{fmtTL(kasaNakit)}</div></div>
      <div><div style={{fontSize:8,opacity:.5}}>Banka Alacak (POS)</div><div style={{fontSize:12,fontWeight:700,fontFamily:D.fd}}>{fmtTL(bankaAlacak)}</div></div>
      <div><div style={{fontSize:8,opacity:.5}}>Aylık Kredi Yükü</div><div style={{fontSize:12,fontWeight:700,fontFamily:D.fd}}>{fmtTL(krediAy)}</div></div>
      <div><div style={{fontSize:8,opacity:.5}}>Kira + Personel</div><div style={{fontSize:12,fontWeight:700,fontFamily:D.fd}}>{fmtTL(kiraAy+personelAy)}</div></div>
    </div>
    {netCariAlacak>0&&<div style={{marginTop:6,padding:"4px 8px",background:"rgba(255,255,255,0.1)",borderRadius:6,fontSize:10}}>🏢 Dış firma alacak: <strong>{fmtTL(netCariAlacak)}</strong></div>}
  </div>;
})()}

{/* ═══ KASA DURUM LAMBALARI ═══ */}
{(()=>{

          </div>

</div>
{showPinPanel&&<div className="fu" style={{marginTop:10}}><PinYonetim user={user} onClose={()=>setShowPinPanel(false)}/></div>}</div>
<QBar onNav={onNav} active="home"/></div>;}

/* ═══ ROOT ═══ */
function App(){
const[user,setUser]=useState(()=>{try{const s=sessionStorage.getItem("bardaks_user");return s?JSON.parse(s):null;}catch(e){return null;}});
const[scr,setScr]=useState(()=>{try{return sessionStorage.getItem("bardaks_scr")||"home";}catch(e){return"home";}});
const[data,setData]=useState(loadD);
useEffect(()=>{if(user)sessionStorage.setItem("bardaks_user",JSON.stringify(user));else sessionStorage.removeItem("bardaks_user");},[user]);
useEffect(()=>{sessionStorage.setItem("bardaks_scr",scr);},[scr]);
useEffect(()=>{saveD(data);},[data]);
const nav=id=>{if(id==="logout"){setUser(null);setScr("home");try{sessionStorage.removeItem("bardaks_user");sessionStorage.removeItem("bardaks_scr");}catch(e){}return;}setScr(id);};const goHome=()=>setScr("home");
if(!user)return<Pin onAuth={u=>{setUser(u);
  /* Rol bazlı ilk ekran */
  if(u.role==="personel"){setScr(u.sirket||"sahis");}
  else if(u.role==="mudur"){setScr(u.sirket||"sahis");}
  else{setScr("home");}
}}/>;
/* ═══ PERSONEL: Sadece kendi şubesinin POS + Z-Rapor ekranı ═══ */
if(user.role==="personel"){
  const yetki=ROL_YETKI.personel;
  const coId=user.sirket||"sahis";
  const brName=user.sube||"KTÜ";
  const br=BRANCHES[coId]?.find(b=>b.name===brName)||BRANCHES[coId]?.[0];
  return<PersonelEkran user={user} branch={br} companyId={coId} data={data} setData={setData} onLogout={()=>nav("logout")}/>;
}
/* ═══ MÜDÜR: Kendi şubesinin kontrol paneli (gider+personel+zrapor) ═══ */
if(user.role==="mudur"){
  const coId=user.sirket||"sahis";
  if(scr==="finance"||scr==="home"){/* Müdür finansa gidemez, kendi şirketine yönlendir */
    return<CoMenu companyId={coId} goHome={goHome} onNav={nav} data={data} setData={setData} user={user}/>;
  }
}
if(scr==="ltd")return<CoMenu companyId="ltd" goHome={goHome} onNav={nav} data={data} setData={setData} user={user}/>;
if(scr==="sahis")return<CoMenu companyId="sahis" goHome={goHome} onNav={nav} data={data} setData={setData} user={user}/>;
if(scr==="finance"&&user.role==="patron")return<Finance goHome={goHome} onNav={nav} data={data} setData={setData}/>;
return<Dashboard user={user} onNav={nav} data={data}/>;}
const root=ReactDOM.createRoot(document.getElementById('root'));root.render(<App/>);

</script></body></html>
