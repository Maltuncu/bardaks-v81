/* ═══ Z-RAPORU KASA KAPATMA ═══ */
function ZRapor({sube,sirket,goHome,goBack,data,setData}){
  const[photo,setPhoto]=useState(null);
  const[form,setForm]=useState({ciro:"",nakit:"",kart:"",kdv1:"",kdv10:"",kdv20:"",fizikselNakit:""});
  const[saved,setSaved]=useState(false);
  const[analyzing,setAnalyzing]=useState(false);

  const nakitFark=form.fizikselNakit&&form.nakit?Number(form.fizikselNakit)-Number(form.nakit):0;
  const toplamKDV=(Number(form.kdv1)||0)+(Number(form.kdv10)||0)+(Number(form.kdv20)||0);

  const handlePhoto=e=>{
    const file=e.target.files[0];if(!file)return;
    setPhoto(file);setAnalyzing(true);
    // AI OCR simülasyonu - gerçekte Anthropic API ile yapılacak
    setTimeout(()=>{
      setForm(prev=>({...prev,ciro:"17485",nakit:"3030",kart:"14455",kdv1:"85",kdv10:"1240",kdv20:"2180"}));
      setAnalyzing(false);
    },1500);
  };

  const kaydet=()=>{
    const zr={id:nid(),sube,sirket,tarih:TODAY.toISOString().split("T")[0],ciro:Number(form.ciro),nakit:Number(form.nakit),kart:Number(form.kart),kdv1:Number(form.kdv1),kdv10:Number(form.kdv10),kdv20:Number(form.kdv20),fizikselNakit:Number(form.fizikselNakit),fark:nakitFark,hasPhoto:!!photo,personel:PINS["0000"].name};
    setData(prev=>{const n=JSON.parse(JSON.stringify(prev));n[sirket].zRaporlari.push(zr);return n;});
    setSaved(true);
  };

  if(saved)return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style><Header title="Z-Raporu Kaydedildi" onHome={goHome} onBack={goBack}/><div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",padding:20}}><div style={{fontSize:48,marginBottom:16}}>✅</div><h2 style={{fontFamily:D.fd,color:D.blue,marginBottom:8}}>Başarıyla Kaydedildi</h2>{nakitFark!==0&&<div style={{background:nakitFark<0?D.rS:D.gS,borderRadius:14,padding:"14px 20px",marginTop:12}}><span style={{fontWeight:700,color:nakitFark<0?D.r:D.g,fontSize:15}}>{nakitFark<0?"⚠️ Kasa Açığı":"💰 Kasa Fazlası"}: {fmtTL(Math.abs(nakitFark))}</span></div>}<button onClick={goBack} className="tap" style={{marginTop:24,padding:"12px 32px",borderRadius:14,border:"none",background:D.blue,color:D.w,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:D.f}}>Tamam</button></div></div>;

  return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}>
    <style>{G}</style>
    <Header title={"Z-Raporu — "+sube} crumbs={sirket==="ltd"?"Limited":"Şahıs"} onHome={goHome} onBack={goBack}/>
    <div style={{flex:1,overflow:"auto",padding:14}}>
      <div style={{background:D.w,borderRadius:16,boxShadow:D.s2,padding:18,maxWidth:480,margin:"0 auto"}}>
        {/* Fotoğraf */}
        <h4 style={{fontSize:13,fontWeight:700,marginBottom:8}}>1. Z-Raporu Fotoğrafı</h4>
        <label className="tap" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:18,borderRadius:14,border:`2px dashed ${photo?D.g:D.blueBd}`,cursor:"pointer",background:photo?D.gS:D.blueGh,marginBottom:14}}>
          <Ic.Camera s={22} c={photo?D.g:D.blue}/><span style={{fontWeight:600,color:photo?D.g:D.blue,fontSize:13}}>{analyzing?"⏳ AI Analiz ediyor...":photo?"✓ Fotoğraf yüklendi — veriler çekildi":"Fotoğraf Çek / Yükle (AI otomatik okur)"}</span>
          <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handlePhoto}/>
        </label>

        {/* Veriler */}
        <h4 style={{fontSize:13,fontWeight:700,marginBottom:8}}>2. Satış Verileri {photo&&<span style={{fontSize:10,color:D.g,fontWeight:600}}>(AI doldurdu — düzenleyebilirsin)</span>}</h4>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          <Field label="Toplam Ciro (₺)" value={form.ciro} onChange={v=>setForm({...form,ciro:v})} type="number"/>
          <Field label="Nakit Satış (₺)" value={form.nakit} onChange={v=>setForm({...form,nakit:v})} type="number"/>
          <Field label="Kart Satış (₺)" value={form.kart} onChange={v=>setForm({...form,kart:v})} type="number"/>
        </div>

        {/* KDV */}
        <h4 style={{fontSize:13,fontWeight:700,marginBottom:8}}>3. KDV Matrahları</h4>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          <Field label="KDV %1 (₺)" value={form.kdv1} onChange={v=>setForm({...form,kdv1:v})} type="number"/>
          <Field label="KDV %10 (₺)" value={form.kdv10} onChange={v=>setForm({...form,kdv10:v})} type="number"/>
          <Field label="KDV %20 (₺)" value={form.kdv20} onChange={v=>setForm({...form,kdv20:v})} type="number"/>
        </div>
        {toplamKDV>0&&<div style={{background:D.blueMi,borderRadius:10,padding:"8px 12px",marginBottom:14,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:D.t2}}>Toplam KDV</span><span style={{fontWeight:700,color:D.blue,fontSize:14}}>{fmtTL(toplamKDV)}</span></div>}

        {/* Fiziksel Nakit */}
        <h4 style={{fontSize:13,fontWeight:700,marginBottom:8}}>4. Fiziksel Nakit Sayımı</h4>
        <Field label="Kasadaki Fiziksel Nakit (₺)" value={form.fizikselNakit} onChange={v=>setForm({...form,fizikselNakit:v})} type="number" placeholder="Elle sayılan tutar"/>
        {form.fizikselNakit&&form.nakit&&<div style={{background:nakitFark===0?D.gS:D.rS,borderRadius:12,padding:"10px 14px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span>Z-Raporu Nakit</span><span style={{fontWeight:700}}>{fmtTL(Number(form.nakit))}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span>Fiziksel Nakit</span><span style={{fontWeight:700}}>{fmtTL(Number(form.fizikselNakit))}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:800,color:nakitFark===0?D.g:D.r,borderTop:`1px solid ${nakitFark===0?"rgba(45,168,84,.2)":"rgba(220,62,53,.2)"}`,paddingTop:6,marginTop:6}}>
            <span>{nakitFark===0?"✓ Tam tuttu":nakitFark<0?"⚠️ Kasa Açığı":"💰 Kasa Fazlası"}</span>
            <span>{nakitFark!==0?fmtTL(Math.abs(nakitFark)):"₺0"}</span>
          </div>
        </div>}

        <button onClick={kaydet} disabled={!form.ciro} className="tap" style={{width:"100%",padding:14,borderRadius:14,border:"none",background:form.ciro?D.blue:D.t3,color:D.w,fontSize:15,fontWeight:700,cursor:form.ciro?"pointer":"not-allowed",fontFamily:D.f}}>Kasayı Kapat & Kaydet</button>
      </div>
    </div>
  </div>;
}

function VergiPanel({data,co,gp,goBack}){
  const zr=data[co].zRaporlari||[];
  const aylikKDV=zr.reduce((s,r)=>s+(r.kdv1||0)+(r.kdv10||0)+(r.kdv20||0),0);
  const aylikCiro=zr.reduce((s,r)=>s+(r.ciro||0),0);
  const faizGideri=data[co].krediler.filter(k=>k.ticari).reduce((s,k)=>s+(k.faiz||0)*((k.total||1)-(k.remaining||0)),0);
  const kasaAciklari=zr.filter(r=>r.fark<0);

  return<div style={{padding:0}}>
    <div className="fu" style={{background:`linear-gradient(135deg,${D.blue},${D.blueDk})`,borderRadius:16,padding:"18px",marginBottom:12,color:D.w}}>

const PRODS=[{id:"p1",n:"Filtre Kahve",p:60,c:"kahve"},{id:"p2",n:"Latte",p:80,c:"kahve"},{id:"p3",n:"Cappuccino",p:80,c:"kahve"},{id:"p4",n:"Espresso",p:55,c:"kahve"},{id:"p5",n:"Türk Kahvesi",p:50,c:"kahve"},{id:"p6",n:"San Sebastian",p:120,c:"pasta"},{id:"p7",n:"Tiramisu",p:110,c:"pasta"},{id:"p8",n:"Cheesecake",p:100,c:"pasta"},{id:"p9",n:"Klasik Kruvasan",p:70,c:"kruv"},{id:"p10",n:"Çikolatalı",p:85,c:"kruv"},{id:"p11",n:"Limonata",p:65,c:"icecek"},{id:"p12",n:"Ice Tea",p:55,c:"icecek"},{id:"p13",n:"Su",p:15,c:"icecek"}];

function Satis({name,goHome,goBack,onNav,qb}){const[cat,setCat]=useState("kahve");const[cart,setCart]=useState([]);const prods=PRODS.filter(p=>p.c===cat);const total=cart.reduce((s,c)=>s+c.p*c.q,0);const add=p=>setCart(prev=>{const e=prev.find(c=>c.id===p.id);if(e)return prev.map(c=>c.id===p.id?{...c,q:c.q+1}:c);return[...prev,{...p,q:1}];});
return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style><Header title={"Satış — "+name} onHome={goHome} onBack={goBack}/><div style={{flex:1,display:"flex",overflow:"hidden"}}><div style={{flex:1,display:"flex",flexDirection:"column"}}><div style={{display:"flex",gap:5,padding:"8px 12px"}}>{CATS.map(c=>{const ac=cat===c.id;return<button key={c.id} onClick={()=>setCat(c.id)} className="tap" style={{display:"flex",alignItems:"center",gap:5,padding:"5px 9px 5px 5px",borderRadius:50,border:"none",cursor:"pointer",background:ac?D.blue:D.w,boxShadow:D.s1}}><Img src={A[c.a]} size={22} round/><span style={{fontSize:11,fontWeight:600,color:ac?D.w:D.t,whiteSpace:"nowrap"}}>{c.n}</span></button>;})}</div><div style={{flex:1,overflow:"auto",padding:"3px 12px 12px"}}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(95px,1fr))",gap:6}}>{prods.map(p=>{const ic=cart.find(c=>c.id===p.id);return<button key={p.id} onClick={()=>add(p)} className="tap" style={{background:D.w,borderRadius:12,border:ic?`2px solid ${D.blue}`:`1px solid ${D.blueBd}`,padding:"10px 7px 7px",cursor:"pointer",textAlign:"left",position:"relative",boxShadow:D.s1}}>{ic&&<div style={{position:"absolute",top:4,right:4,width:18,height:18,borderRadius:9,background:D.blue,color:D.w,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{ic.q}</div>}<div style={{fontSize:11,fontWeight:600}}>{p.n}</div><div style={{fontSize:13,fontWeight:800,color:D.blue}}>₺{p.p}</div></button>;})}</div></div></div><div style={{width:230,background:D.w,borderLeft:`1px solid ${D.blueBd}`,display:"flex",flexDirection:"column"}}><div style={{padding:"10px 12px",borderBottom:`1px solid ${D.blueBd}`,fontWeight:700,fontSize:13}}>Adisyon</div><div style={{flex:1,overflow:"auto"}}>{cart.map(it=><div key={it.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 12px",borderBottom:`1px solid ${D.blueGh}`,fontSize:11}}><span>{it.q}× {it.n}</span><span style={{fontWeight:700,color:D.blue}}>₺{it.p*it.q}</span></div>)}</div>{cart.length>0&&<div style={{padding:"10px 12px",borderTop:`1px solid ${D.blueBd}`,background:D.ivory}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontWeight:600,fontSize:12}}>Toplam</span><span style={{fontSize:17,fontWeight:800,color:D.blue,fontFamily:D.fd}}>₺{fmt(total)}</span></div><div style={{display:"flex",gap:5}}><button className="tap" style={{flex:1,padding:8,borderRadius:10,border:"none",background:D.gS,cursor:"pointer",fontWeight:700,color:D.g,fontSize:11,fontFamily:D.f}}>Nakit</button><button className="tap" style={{flex:1,padding:8,borderRadius:10,border:"none",background:D.blueMi,cursor:"pointer",fontWeight:700,color:D.blue,fontSize:11,fontFamily:D.f}}>Kart</button></div></div>}</div></div><QBar onNav={onNav} active={qb}/></div>;}

const BRANCHES={ltd:[{id:"meydan",name:"Meydan",type:"garsonlu"},{id:"imalathane",name:"İmalathane",type:"uretim"}],sahis:[{id:"ktu",name:"KTÜ",type:"self"},{id:"samsun",name:"Samsun",type:"self"}]};
function CoMenu({companyId,goHome,onNav,data,setData,user}){const[scr,setScr]=useState("menu");const[branch,setBranch]=useState(null);const branches=BRANCHES[companyId];const name=companyId==="ltd"?"Bardaks Limited":"Bardaks Şahıs";const goMenu=()=>{setScr("menu");setBranch(null);};
if(scr==="pos"&&branch)return<Satis name={branch.name} goHome={goHome} goBack={goMenu} onNav={onNav} qb={companyId}/>;
if(scr==="sevk")return<Satis name="İmalathane (Sevk)" goHome={goHome} goBack={goMenu} onNav={onNav} qb="ltd"/>;
if(scr==="masa")return<Satis name="Meydan" goHome={goHome} goBack={goMenu} onNav={onNav} qb="ltd"/>;
if(scr==="z")return<ZRapor sube={branch?.name||"Meydan"} sirket={companyId} goHome={goHome} goBack={goMenu} data={data} setData={setData}/>;
return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style><Header title={name} crumbs={"Ana Sayfa › "+(companyId==="ltd"?"Limited":"Şahıs")} onHome={goHome}/><div style={{flex:1,overflow:"auto",padding:14,maxWidth:440,margin:"0 auto",width:"100%"}}>{branches.map((b,i)=><button key={b.id} onClick={()=>{if(b.type==="garsonlu")setScr("masa");else if(b.type==="uretim")setScr("sevk");else{setBranch(b);setScr("pos");}}} className="tap fu" style={{width:"100%",background:D.w,borderRadius:16,padding:"14px 16px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12,boxShadow:D.s1,marginBottom:10,animationDelay:i*.07+"s"}}><Img src={b.type==="garsonlu"?A.kafe:b.type==="uretim"?A.kruvasan:A.kahve} size={40} round/><div><div style={{fontWeight:700,fontSize:14}}>{b.name}</div><div style={{fontSize:11,color:D.t3}}>{b.type==="garsonlu"?"Masa Planı":b.type==="uretim"?"Sevkiyat":"Hızlı Satış"}</div></div></button>)}
{user.role==="patron"&&<><h3 style={{fontSize:11,fontWeight:700,color:D.t3,margin:"16px 0 8px"}}>DENETİM</h3>{branches.map(b=><button key={"z-"+b.id} onClick={()=>{setBranch(b);setScr("z");}} className="tap fu" style={{width:"100%",background:D.w,borderRadius:14,padding:"12px 16px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10,boxShadow:D.s1,marginBottom:8}}><Ic.Camera s={20} c={D.blue}/><div><div style={{fontWeight:600,fontSize:13}}>Kasa Kapat — {b.name}</div><div style={{fontSize:10,color:D.t3}}>Z-Raporu + Nakit Sayımı</div></div></button>)}</>}
</div><QBar onNav={onNav} active={companyId}/></div>;}

/* ═══ ANA SAYFA ═══ */
function Dashboard({user,onNav,data}){const warns=[];[data.ltd,data.sahis].forEach(d=>{d.krediler.forEach(k=>{const x=daysTil(k.nextDate);if(x>=0&&x<=7)warns.push(k.bank+" — "+x+"g");});d.cekler.forEach(c=>{const x=daysTil(c.vade);if(x>=0&&x<=7)warns.push("Çek "+c.no+" — "+x+"g");});(d.zRaporlari||[]).forEach(z=>{if(z.fark<0)warns.push("⚠️ Kasa açığı "+z.sube+": "+fmtTL(Math.abs(z.fark)));});});
return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style><header style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:D.w,borderBottom:`1px solid ${D.blueBd}`}}><Img src={A.logo} size={36} round/><div style={{flex:1}}><div style={{fontWeight:800,fontSize:16,color:D.blue,fontFamily:D.fd}}>Bardak's</div><div style={{fontSize:10,color:D.t3}}>v16.0 — {user.name}</div></div><button onClick={()=>onNav("logout")} className="tap" style={{display:"flex",alignItems:"center",gap:3,padding:"5px 10px",borderRadius:50,border:"none",background:D.blueMi,cursor:"pointer",color:D.blue,fontSize:11,fontWeight:600,fontFamily:D.f}}><Ic.Lock s={13} c={D.blue}/>Çıkış</button></header>
<div style={{flex:1,overflow:"auto",padding:"12px 14px 90px"}}>{warns.length>0&&<div className="fu" style={{background:D.rS,border:"1.5px solid rgba(220,62,53,.18)",borderRadius:14,padding:"10px 12px",marginBottom:10,animation:"glow 2s ease infinite"}}><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><Ic.Alert/><span style={{fontWeight:700,color:D.r,fontSize:12}}>Kritik Uyarılar</span></div>{warns.slice(0,6).map((w,i)=><div key={i} style={{fontSize:11,color:D.r,paddingLeft:20}}>• {w}</div>)}</div>}
<div style={{display:"flex",flexDirection:"column",gap:10}}><button onClick={()=>onNav("ltd")} className="tap fu" style={{background:D.w,borderRadius:18,padding:"16px 18px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14,boxShadow:D.s2}}><Img src={A.kafe} size={48} round/><div><div style={{fontWeight:800,fontSize:16,color:D.blue}}>Bardaks Limited</div><div style={{fontSize:12,color:D.t3}}>Meydan + İmalathane</div></div></button>
<button onClick={()=>onNav("sahis")} className="tap fu" style={{background:D.w,borderRadius:18,padding:"16px 18px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14,boxShadow:D.s2,animationDelay:"0.08s"}}><Img src={A.kruvasan} size={48} round/><div><div style={{fontWeight:800,fontSize:16,color:D.blue}}>Bardaks Şahıs</div><div style={{fontSize:12,color:D.t3}}>KTÜ + Samsun</div></div></button>
{user.role==="patron"&&<button onClick={()=>onNav("finance")} className="tap fu" style={{background:`linear-gradient(145deg,${D.blue},${D.blueDk})`,borderRadius:18,padding:"16px 18px",border:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14,color:D.w,boxShadow:D.s2,animationDelay:"0.16s"}}><Ic.Wallet s={26} c={D.w}/><div><div style={{fontWeight:800,fontSize:16}}>Merkezi Finans</div><div style={{fontSize:12,opacity:.7}}>Kredi • Kart • Altın • Çek • Vergi</div></div></button>}</div></div>
<QBar onNav={onNav} active="home"/></div>;}

/* ═══ ROOT ═══ */
function App(){const[user,setUser]=useState(null);const[scr,setScr]=useState("home");const[data,setData]=useState(loadD);
useEffect(()=>{saveD(data);},[data]);
const nav=id=>{if(id==="logout"){setUser(null);setScr("home");return;}setScr(id);};const goHome=()=>setScr("home");
if(!user)return<Pin onAuth={u=>{setUser(u);setScr("home");}}/>;
if(scr==="ltd")return<CoMenu companyId="ltd" goHome={goHome} onNav={nav} data={data} setData={setData} user={user}/>;
if(scr==="sahis")return<CoMenu companyId="sahis" goHome={goHome} onNav={nav} data={data} setData={setData} user={user}/>;
if(scr==="finance")return<Finance goHome={goHome} onNav={nav} data={data} setData={setData}/>;
return<Dashboard user={user} onNav={nav} data={data}/>;}
const root=ReactDOM.createRoot(document.getElementById('root'));root.render(<App/>);

</script></body></html>
