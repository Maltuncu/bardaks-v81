/* ═══ FINANS ANA MODÜL ═══ */
function Finance({goHome,onNav}){
  const[data,setData]=useState(loadData);
  const[co,setCo]=useState("ltd");
  const[sub,setSub]=useState("krediler");
  const[gp,setGp]=useState(3280);
  const[addOpen,setAddOpen]=useState(false);
  const[form,setForm]=useState({});
  const[aiOpen,setAiOpen]=useState(false);
  const[aiMsgs,setAiMsgs]=useState([{r:"ai",t:"Merhaba Patron! Borç ekle, sil veya rapor iste. Örnek: 'Garanti'den 500K ticari kredi ekle, 12 ay, %3.5 faiz'"}]);
  const[aiIn,setAiIn]=useState("");

  useEffect(()=>{fetch("https://api.collectapi.com/economy/goldPrice",{headers:{"authorization":"apikey 6UxMOmGMbHXBQcMpGDOy3p:0kAO5MkSr8dNlJiV5WOJlT","content-type":"application/json"}}).then(r=>r.json()).then(d=>{if(d.success&&d.result){const g=d.result.find(x=>x.name==="Gram Altın");if(g)setGp(Math.round(g.selling));}}).catch(()=>{});},[]);
  useEffect(()=>{saveData(data);},[data]);

  const d=data[co];
  const kT=d.krediler.reduce((s,k)=>s+k.monthly*k.remaining,0);
  const cT=d.kartlar.reduce((s,k)=>s+k.used,0);
  const sT=d.sahis.reduce((s,b)=>s+b.tutar,0);
  const aT=d.altin.reduce((s,a)=>s+a.gram*gp,0);
  const ckT=d.cekler.reduce((s,c)=>s+c.tutar,0);
  const grand=kT+cT+sT+aT+ckT;

  const warns=[];
  d.krediler.forEach(k=>{const dd=daysTil(k.nextDate);if(dd>=0&&dd<=5)warns.push(k.bank+" — "+dd+"g");});
  d.kartlar.forEach(k=>{const dd=daysTil(k.odeme);if(dd>=0&&dd<=5)warns.push(k.name+" — "+dd+"g");});
  d.cekler.forEach(c=>{const dd=daysTil(c.vade);if(dd>=0&&dd<=5)warns.push("Çek "+c.no+" — "+dd+"g");});

  const update=(key,arr)=>{setData(prev=>{const n=JSON.parse(JSON.stringify(prev));n[co][key]=arr;return n;});};
  const del=(key,id)=>{update(key,d[key].filter(x=>x.id!==id));};
  const payKredi=id=>{update("krediler",d.krediler.map(k=>k.id===id?{...k,remaining:Math.max(0,k.remaining-1)}:k));};

  const addItem=()=>{
    const f=form;
    if(sub==="krediler"){update("krediler",[...d.krediler,{id:nid(),bank:f.bank||"Yeni Banka",monthly:Number(f.monthly)||0,remaining:Number(f.remaining)||12,nextDate:f.nextDate||"2026-05-01",ticari:f.ticari==="true",faiz:Number(f.faiz)||0,anapara:Number(f.anapara)||0}]);}
    if(sub==="kartlar"){update("kartlar",[...d.kartlar,{id:nid(),name:f.name||"Yeni Kart",limit:Number(f.limit)||0,used:Number(f.used)||0,odeme:f.odeme||"2026-05-01"}]);}
    if(sub==="sahis"){update("sahis",[...d.sahis,{id:nid(),kisi:f.kisi||"",tutar:Number(f.tutar)||0,aciklama:f.aciklama||"",tip:f.tip||"sözlü"}]);}
    if(sub==="altin"){update("altin",[...d.altin,{id:nid(),kisi:f.kisi||"",gram:Number(f.gram)||0}]);}
    if(sub==="cekler"){update("cekler",[...d.cekler,{id:nid(),no:f.no||"ÇK-"+nid(),tutar:Number(f.tutar)||0,vade:f.vade||"2026-05-01",kime:f.kime||""}]);}
    setAddOpen(false);setForm({});
  };

  /* AI mesaj işleme */
  const processAI=msg=>{
    const lower=msg.toLowerCase();
    let resp="Anladım, işliyorum...";
    if(lower.includes("kredi")&&(lower.includes("ekle")||lower.includes("çek"))){
      const bankMatch=msg.match(/(garanti|ziraat|iş bankası|vakıfbank|halkbank|akbank|denizbank|teb|qnb|şekerbank)/i);
      const amountMatch=msg.match(/(\d+[\.,]?\d*)\s*(k|bin|milyon|m)/i);
      const monthMatch=msg.match(/(\d+)\s*(ay|taksit)/i);
      const rateMatch=msg.match(/%\s*(\d+[\.,]?\d*)/);
      let amount=0,months=12,rate=0,bank=bankMatch?bankMatch[1]:"Yeni Banka";
      if(amountMatch){amount=parseFloat(amountMatch[1].replace(",","."));if(amountMatch[2].toLowerCase()==="k"||amountMatch[2]==="bin")amount*=1000;if(amountMatch[2].toLowerCase()==="m"||amountMatch[2]==="milyon")amount*=1000000;}
      if(monthMatch)months=parseInt(monthMatch[1]);
      if(rateMatch)rate=parseFloat(rateMatch[1].replace(",","."));
      const monthly=Math.round(amount/months);const faiz=Math.round(monthly*rate/100);
      update("krediler",[...d.krediler,{id:nid(),bank,monthly,remaining:months,nextDate:"2026-05-01",ticari:rate>0,faiz,anapara:monthly-faiz}]);
      resp=`✅ ${bank} — ${fmtTL(amount)} kredi eklendi. ${months} taksit × ${fmtTL(monthly)}${rate?` (%${rate} faiz)`:""}.`;
    }else if(lower.includes("altın")&&lower.includes("sil")){
      const nameMatch=msg.match(/(\w+)\s*(abi|usta|dayı)/i);
      if(nameMatch){const name=nameMatch[0];const filtered=d.altin.filter(a=>!a.kisi.toLowerCase().includes(name.toLowerCase()));if(filtered.length<d.altin.length){update("altin",filtered);resp=`✅ ${name} altın borcu silindi.`;}else resp="⚠️ Bu isimde altın borcu bulunamadı.";}
    }else if(lower.includes("rapor")||lower.includes("toplam")){
      const faizTotal=d.krediler.filter(k=>k.ticari).reduce((s,k)=>s+k.faiz*k.remaining,0);
      resp=`📊 ${co==="ltd"?"Limited":"Şahıs"} Raporu:\n• Toplam Kredi: ${fmtTL(kT)}\n• Toplam Kart: ${fmtTL(cT)}\n• Altın: ${fmtTL(aT)}\n• Çekler: ${fmtTL(ckT)}\n• TOPLAM: ${fmtTL(grand)}${faizTotal?"\n• Ticari Kredi Faiz Toplamı: "+fmtTL(faizTotal):""}`;
    }else{resp="Komutları anlamam için şu kalıpları kullan:\n• 'Garanti'den 500K kredi ekle, 12 ay, %3.5 faiz'\n• 'Dayı Ahmet altın borcunu sil'\n• 'Bu ayki toplam raporu çıkar'";}
    return resp;
  };
  const sendAI=()=>{if(!aiIn.trim())return;const msg=aiIn;setAiMsgs(p=>[...p,{r:"user",t:msg}]);setAiIn("");setTimeout(()=>{const resp=processAI(msg);setAiMsgs(p=>[...p,{r:"ai",t:resp}]);},300);};

  const tabs=[{id:"krediler",l:"Krediler",e:"🏦"},{id:"sahis",l:"Şahıs",e:"🤝"},{id:"altin",l:"Altın",e:"🥇"},{id:"kartlar",l:"Kartlar",e:"💳"},{id:"cekler",l:"Çekler",e:"📄"}];

  const renderForm=()=>{
    if(sub==="krediler")return<><Field label="Banka Adı" value={form.bank} onChange={v=>setForm({...form,bank:v})}/><Field label="Aylık Taksit (₺)" value={form.monthly} onChange={v=>setForm({...form,monthly:v})} type="number"/><Field label="Toplam Taksit Sayısı" value={form.remaining} onChange={v=>setForm({...form,remaining:v})} type="number"/><Field label="İlk Ödeme Tarihi" value={form.nextDate} onChange={v=>setForm({...form,nextDate:v})} type="date"/><Field label="Kredi Türü" value={form.ticari||"false"} onChange={v=>setForm({...form,ticari:v})} options={[{v:"false",l:"Bireysel"},{v:"true",l:"Ticari"}]}/>{form.ticari==="true"&&<><Field label="Faiz Kısmı (₺/ay)" value={form.faiz} onChange={v=>setForm({...form,faiz:v})} type="number"/><Field label="Anapara Kısmı (₺/ay)" value={form.anapara} onChange={v=>setForm({...form,anapara:v})} type="number"/></>}</>;
    if(sub==="kartlar")return<><Field label="Kart Adı" value={form.name} onChange={v=>setForm({...form,name:v})}/><Field label="Toplam Limit (₺)" value={form.limit} onChange={v=>setForm({...form,limit:v})} type="number"/><Field label="Kullanılan (₺)" value={form.used} onChange={v=>setForm({...form,used:v})} type="number"/><Field label="Son Ödeme Tarihi" value={form.odeme} onChange={v=>setForm({...form,odeme:v})} type="date"/></>;
    if(sub==="sahis")return<><Field label="Kişi/Firma" value={form.kisi} onChange={v=>setForm({...form,kisi:v})}/><Field label="Tutar (₺)" value={form.tutar} onChange={v=>setForm({...form,tutar:v})} type="number"/><Field label="Açıklama" value={form.aciklama} onChange={v=>setForm({...form,aciklama:v})}/><Field label="Tip" value={form.tip||"sözlü"} onChange={v=>setForm({...form,tip:v})} options={["senetli","sözlü"]}/></>;
    if(sub==="altin")return<><Field label="Kişi" value={form.kisi} onChange={v=>setForm({...form,kisi:v})}/><Field label="Gram Miktarı" value={form.gram} onChange={v=>setForm({...form,gram:v})} type="number"/></>;
    if(sub==="cekler")return<><Field label="Çek No" value={form.no} onChange={v=>setForm({...form,no:v})}/><Field label="Tutar (₺)" value={form.tutar} onChange={v=>setForm({...form,tutar:v})} type="number"/><Field label="Vade Tarihi" value={form.vade} onChange={v=>setForm({...form,vade:v})} type="date"/><Field label="Kime" value={form.kime} onChange={v=>setForm({...form,kime:v})}/></>;
  };

  const renderItems=()=>{
    const Row=({id,main,detail,value,warn,canPay,key2})=><div style={{padding:"11px 16px",borderBottom:`1px solid ${D.blueGh}`,display:"flex",alignItems:"center",background:warn?D.rS:"transparent"}}><div style={{flex:1}}><div style={{fontWeight:600,fontSize:14,display:"flex",alignItems:"center",gap:6}}>{main}{warn&&<span style={{width:7,height:7,borderRadius:4,background:D.r,animation:"pulse 1.5s ease infinite"}}/>}</div><div style={{fontSize:12,color:D.t3}}>{detail}</div></div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontWeight:700,fontSize:14,fontVariantNumeric:"tabular-nums"}}>{fmtTL(value)}</span>{canPay&&<button onClick={()=>payKredi(id)} className="tap" style={{padding:"3px 8px",borderRadius:6,border:"none",background:D.gS,cursor:"pointer",color:D.g,fontSize:10,fontWeight:700}}>Ödendi</button>}<button onClick={()=>del(key2,id)} className="tap" style={{padding:4,borderRadius:6,border:"none",background:D.rS,cursor:"pointer"}}><Ic.Trash s={14} c={D.r}/></button></div></div>;

    if(sub==="krediler")return d.krediler.map(k=><Row key={k.id} id={k.id} key2="krediler" main={k.bank+(k.ticari?" (Ticari)":"")} detail={k.remaining+" taksit × "+fmtTL(k.monthly)+(k.ticari?" | Faiz: "+fmtTL(k.faiz)+"/ay":"")+" | Sonraki: "+k.nextDate} value={k.monthly*k.remaining} warn={daysTil(k.nextDate)<=5} canPay/>);
    if(sub==="kartlar")return d.kartlar.map(k=><Row key={k.id} id={k.id} key2="kartlar" main={k.name} detail={"Limit: "+fmtTL(k.limit)+" | Son Ödeme: "+k.odeme} value={k.used} warn={daysTil(k.odeme)<=5}/>);
    if(sub==="sahis")return d.sahis.map(b=><Row key={b.id} id={b.id} key2="sahis" main={b.kisi+" ("+b.tip+")"} detail={b.aciklama} value={b.tutar}/>);
    if(sub==="altin")return d.altin.map(a=><Row key={a.id} id={a.id} key2="altin" main={a.kisi} detail={a.gram+"g × ₺"+fmt(gp)+"/g"} value={a.gram*gp}/>);
    if(sub==="cekler")return d.cekler.map(c=><Row key={c.id} id={c.id} key2="cekler" main={c.no+" → "+c.kime} detail={"Vade: "+c.vade} value={c.tutar} warn={daysTil(c.vade)<=5}/>);
  };

  const totals={krediler:kT,kartlar:cT,sahis:sT,altin:aT,cekler:ckT};
  const tabEmoji={krediler:"🏦",kartlar:"💳",sahis:"🤝",altin:"🥇",cekler:"📄"};

  return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}>
    <style>{G}</style>
    <Header title="Merkezi Finans" crumbs="Finans" onHome={goHome}/>
    <div style={{display:"flex",margin:"8px 14px 0",background:D.blueMi,borderRadius:12,padding:3}}>{[{id:"ltd",l:"Limited"},{id:"sahis",l:"Şahıs"}].map(t=><button key={t.id} onClick={()=>{setCo(t.id);setSub("krediler");}} className="tap" style={{flex:1,padding:9,borderRadius:9,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:D.f,background:co===t.id?D.w:"transparent",color:co===t.id?D.blue:D.t3,boxShadow:co===t.id?D.s1:"none"}}>{t.l}</button>)}</div>
    {/* Özet */}
    <div style={{display:"flex",gap:5,padding:"8px 14px 0"}}><div style={{flex:1,background:D.w,borderRadius:10,padding:"8px 10px",boxShadow:D.s1,borderLeft:`3px solid ${D.blue}`}}><div style={{fontSize:9,color:D.t3}}>Toplam</div><div style={{fontSize:15,fontWeight:800,color:D.blue,fontFamily:D.fd}}>{fmtTL(grand)}</div></div>{co==="sahis"&&<div style={{flex:1,background:D.w,borderRadius:10,padding:"8px 10px",boxShadow:D.s1,borderLeft:"3px solid #B8860B"}}><div style={{fontSize:9,color:D.t3}}>Altın ₺{fmt(gp)}/g</div><div style={{fontSize:15,fontWeight:800,color:"#B8860B",fontFamily:D.fd}}>{fmtTL(aT)}</div></div>}</div>
    {/* 5'li Tab */}
    <div style={{display:"flex",gap:3,padding:"8px 14px 0",overflowX:"auto"}}>{tabs.map(t=><button key={t.id} onClick={()=>setSub(t.id)} className="tap" style={{padding:"7px 10px",borderRadius:9,border:"none",cursor:"pointer",background:sub===t.id?D.blue:D.w,color:sub===t.id?D.w:D.t2,fontSize:11,fontWeight:600,fontFamily:D.f,whiteSpace:"nowrap",boxShadow:D.s1}}>{t.e} {t.l}</button>)}</div>
    <div style={{flex:1,overflow:"auto",padding:"8px 14px 90px"}}>
      {warns.length>0&&<div style={{background:D.rS,border:"1.5px solid rgba(220,62,53,.18)",borderRadius:12,padding:"10px 12px",marginBottom:10,animation:"glow 2s ease infinite"}}><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><Ic.Alert s={16}/><span style={{fontWeight:700,color:D.r,fontSize:12}}>Kritik</span></div>{warns.map((w,i)=><div key={i} style={{fontSize:11,color:D.r,paddingLeft:20}}>• {w}</div>)}</div>}
      {/* Başlık + Ekle butonu */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontWeight:700,fontSize:15}}>{tabEmoji[sub]} {tabs.find(t=>t.id===sub)?.l} — {fmtTL(totals[sub])}</span><button onClick={()=>{setForm({});setAddOpen(true);}} className="tap" style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",borderRadius:50,border:"none",background:D.blue,cursor:"pointer",color:D.w,fontSize:12,fontWeight:700,fontFamily:D.f}}><Ic.Plus s={14} c={D.w}/>Ekle</button></div>
      <div style={{background:D.w,borderRadius:14,boxShadow:D.s1,border:`1px solid ${D.blueBd}`,overflow:"hidden"}}>{renderItems()}</div>
    </div>
    <QuickBar onNav={onNav} active="finance"/>

    {/* Yeni Ekle Modal */}
    <Modal open={addOpen} onClose={()=>setAddOpen(false)} title={"Yeni "+tabs.find(t=>t.id===sub)?.l+" Ekle"}>{renderForm()}<button onClick={addItem} className="tap" style={{width:"100%",padding:14,borderRadius:14,border:"none",background:D.blue,color:D.w,fontSize:15,fontWeight:700,cursor:"pointer",marginTop:8,fontFamily:D.f}}>Kaydet</button></Modal>

    {/* AI Bubble */}
    {!aiOpen&&<button onClick={()=>setAiOpen(true)} className="tap" style={{position:"fixed",bottom:70,right:16,width:52,height:52,borderRadius:26,background:`linear-gradient(135deg,${D.blue},${D.blueDk})`,border:"none",cursor:"pointer",boxShadow:D.s2,display:"flex",alignItems:"center",justifyContent:"center",zIndex:90}}><Ic.Chat s={24} c={D.w}/></button>}
    {aiOpen&&<div style={{position:"fixed",bottom:60,right:12,width:340,maxWidth:"90vw",height:420,background:D.w,borderRadius:20,boxShadow:D.s2,border:`1px solid ${D.blueBd}`,display:"flex",flexDirection:"column",zIndex:99,animation:"slideUp .4s cubic-bezier(.16,1,.3,1)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${D.blueBd}`}}><span style={{fontWeight:700,fontSize:14,color:D.blue}}>Bardaks AI</span><button onClick={()=>setAiOpen(false)} className="tap" style={{border:"none",background:D.blueMi,cursor:"pointer",width:28,height:28,borderRadius:14,fontSize:14,color:D.t2,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button></div>
      <div style={{flex:1,overflow:"auto",padding:12}}>{aiMsgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.r==="user"?"flex-end":"flex-start",marginBottom:6}}><div style={{maxWidth:"85%",padding:"9px 13px",borderRadius:14,background:m.r==="user"?D.blue:D.blueGh,color:m.r==="user"?D.w:D.t,fontSize:13,whiteSpace:"pre-line",lineHeight:1.5}}>{m.t}</div></div>)}</div>
      <div style={{padding:"8px 12px",borderTop:`1px solid ${D.blueBd}`,display:"flex",gap:6}}><input value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendAI()} placeholder="Komut yaz..." style={{flex:1,borderRadius:50,padding:"9px 14px",fontSize:13}}/><button onClick={sendAI} className="tap" style={{width:36,height:36,borderRadius:18,border:"none",background:D.blue,color:D.w,cursor:"pointer",fontSize:16}}>↑</button></div>
    </div>}
  </div>;
}

/* ═══ ŞUBE (Kısaltılmış POS + Sevkiyat) ═══ */
const CATS=[{id:"kahve",n:"Kahveler",a:"kahve"},{id:"pasta",n:"Pastalar",a:"pasta"},{id:"kruv",n:"Kruvasanlar",a:"kruvasan"},{id:"icecek",n:"İçecekler",a:"kahve"}];
const PRODS=[{id:"p1",n:"Filtre Kahve",p:60,c:"kahve"},{id:"p2",n:"Latte",p:80,c:"kahve"},{id:"p3",n:"Cappuccino",p:80,c:"kahve"},{id:"p4",n:"Espresso",p:55,c:"kahve"},{id:"p5",n:"Türk Kahvesi",p:50,c:"kahve"},{id:"p6",n:"San Sebastian",p:120,c:"pasta"},{id:"p7",n:"Tiramisu",p:110,c:"pasta"},{id:"p8",n:"Cheesecake",p:100,c:"pasta"},{id:"p9",n:"Klasik Kruvasan",p:70,c:"kruv"},{id:"p10",n:"Çikolatalı",p:85,c:"kruv"},{id:"p11",n:"Limonata",p:65,c:"icecek"},{id:"p12",n:"Ice Tea",p:55,c:"icecek"},{id:"p13",n:"Su",p:15,c:"icecek"}];
const SEVK=[{id:"s1",n:"Cheesecake",u:"dilim"},{id:"s2",n:"San Sebastian",u:"dilim"},{id:"s3",n:"Kruvasan",u:"adet"},{id:"s4",n:"Brownie",u:"adet"}];

function Satis({name,goHome,goBack,onNav,qb}){const[cat,setCat]=useState("kahve");const[cart,setCart]=useState([]);const prods=PRODS.filter(p=>p.c===cat);const total=cart.reduce((s,c)=>s+c.p*c.q,0);const add=p=>setCart(prev=>{const e=prev.find(c=>c.id===p.id);if(e)return prev.map(c=>c.id===p.id?{...c,q:c.q+1}:c);return[...prev,{...p,q:1}];});
return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style><Header title={"Satış — "+name} onHome={goHome} onBack={goBack}/><div style={{flex:1,display:"flex",overflow:"hidden"}}><div style={{flex:1,display:"flex",flexDirection:"column"}}><div style={{display:"flex",gap:6,padding:"8px 12px"}}>{CATS.map(c=>{const ac=cat===c.id;return<button key={c.id} onClick={()=>setCat(c.id)} className="tap" style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px 5px 5px",borderRadius:50,border:"none",cursor:"pointer",background:ac?D.blue:D.w,boxShadow:D.s1}}><Img src={A[c.a]} size={24} round style={{border:ac?"2px solid rgba(255,255,255,.3)":`2px solid ${D.blueBd}`}}/><span style={{fontSize:11,fontWeight:600,color:ac?D.w:D.t,whiteSpace:"nowrap"}}>{c.n}</span></button>;})}</div><div style={{flex:1,overflow:"auto",padding:"4px 12px 12px"}}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:7}}>{prods.map(p=>{const ic=cart.find(c=>c.id===p.id);return<button key={p.id} onClick={()=>add(p)} className="tap" style={{background:D.w,borderRadius:12,border:ic?`2px solid ${D.blue}`:`1px solid ${D.blueBd}`,padding:"10px 7px 7px",cursor:"pointer",textAlign:"left",position:"relative",boxShadow:D.s1}}>{ic&&<div style={{position:"absolute",top:4,right:4,width:18,height:18,borderRadius:9,background:D.blue,color:D.w,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{ic.q}</div>}<div style={{fontSize:11,fontWeight:600}}>{p.n}</div><div style={{fontSize:13,fontWeight:800,color:D.blue,marginTop:2}}>₺{p.p}</div></button>;})}</div></div></div><div style={{width:240,background:D.w,borderLeft:`1px solid ${D.blueBd}`,display:"flex",flexDirection:"column"}}><div style={{padding:"10px 12px",borderBottom:`1px solid ${D.blueBd}`,fontWeight:700,fontSize:14}}>Adisyon</div><div style={{flex:1,overflow:"auto"}}>{cart.map(it=><div key={it.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 12px",borderBottom:`1px solid ${D.blueGh}`,fontSize:12}}><span>{it.q}× {it.n}</span><span style={{fontWeight:700,color:D.blue}}>₺{it.p*it.q}</span></div>)}</div>{cart.length>0&&<div style={{padding:"10px 12px",borderTop:`1px solid ${D.blueBd}`,background:D.ivory}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontWeight:600,fontSize:12}}>Toplam</span><span style={{fontSize:17,fontWeight:800,color:D.blue,fontFamily:D.fd}}>₺{fmt(total)}</span></div><div style={{display:"flex",gap:5}}><button className="tap" style={{flex:1,padding:9,borderRadius:10,border:"none",background:D.gS,cursor:"pointer",fontWeight:700,color:D.g,fontSize:12,fontFamily:D.f}}>Nakit</button><button className="tap" style={{flex:1,padding:9,borderRadius:10,border:"none",background:D.blueMi,cursor:"pointer",fontWeight:700,color:D.blue,fontSize:12,fontFamily:D.f}}>Kart</button></div></div>}</div></div><QuickBar onNav={onNav} active={qb}/></div>;}

function Sevkiyat({goHome,goBack,onNav}){const[items,setItems]=useState(SEVK.map(i=>({...i,qty:0})));const[target,setTarget]=useState("meydan");const setQ=(id,q)=>setItems(p=>p.map(it=>it.id===id?{...it,qty:Math.max(0,q)}:it));
return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style><Header title="Sevkiyat" crumbs="Limited › İmalathane" onHome={goHome} onBack={goBack}/><div style={{flex:1,overflow:"auto",padding:14}}><div style={{background:D.w,borderRadius:14,boxShadow:D.s2,padding:18,maxWidth:440,margin:"0 auto"}}><select value={target} onChange={e=>setTarget(e.target.value)} style={{marginBottom:14}}><option value="meydan">Meydan (Ltd)</option><option value="ktu">KTÜ (Şahıs)</option><option value="samsun">Samsun (Şahıs)</option></select>{items.map(it=><div key={it.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${D.blueGh}`}}><div style={{fontWeight:600,fontSize:14}}>{it.n} <span style={{fontSize:11,color:D.t3}}>({it.u})</span></div><div style={{display:"flex",alignItems:"center",gap:6}}><button onClick={()=>setQ(it.id,it.qty-1)} className="tap" style={{width:30,height:30,borderRadius:15,border:"none",background:D.ivory,cursor:"pointer",fontSize:16,fontWeight:700}}>−</button><span style={{width:26,textAlign:"center",fontSize:15,fontWeight:700}}>{it.qty}</span><button onClick={()=>setQ(it.id,it.qty+1)} className="tap" style={{width:30,height:30,borderRadius:15,border:"none",background:D.ivory,cursor:"pointer",fontSize:16,fontWeight:700}}>+</button></div></div>)}{items.some(i=>i.qty>0)&&<button className="tap" style={{width:"100%",padding:13,borderRadius:14,border:"none",background:D.blue,color:D.w,fontSize:15,fontWeight:700,cursor:"pointer",marginTop:14,fontFamily:D.f}}>Sevk Et</button>}</div></div><QuickBar onNav={onNav} active="ltd"/></div>;}

const BRANCHES={ltd:[{id:"meydan",name:"Meydan",type:"garsonlu"},{id:"imalathane",name:"İmalathane",type:"uretim"}],sahis:[{id:"ktu",name:"KTÜ",type:"self"},{id:"samsun",name:"Samsun",type:"self"}]};
function CoMenu({companyId,goHome,onNav}){const[scr,setScr]=useState("menu");const[branch,setBranch]=useState(null);const branches=BRANCHES[companyId];const name=companyId==="ltd"?"Bardaks Limited":"Bardaks Şahıs";const goMenu=()=>{setScr("menu");setBranch(null);};
if(scr==="pos"&&branch)return<Satis name={branch.name} goHome={goHome} goBack={goMenu} onNav={onNav} qb={companyId}/>;
if(scr==="sevk")return<Sevkiyat goHome={goHome} goBack={goMenu} onNav={onNav}/>;
if(scr==="masa")return<Satis name="Meydan" goHome={goHome} goBack={goMenu} onNav={onNav} qb="ltd"/>;
return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style><Header title={name} crumbs={"Ana Sayfa › "+(companyId==="ltd"?"Limited":"Şahıs")} onHome={goHome}/><div style={{flex:1,overflow:"auto",padding:14,maxWidth:440,margin:"0 auto",width:"100%"}}>{branches.map((b,i)=><button key={b.id} onClick={()=>{if(b.type==="garsonlu")setScr("masa");else if(b.type==="uretim")setScr("sevk");else{setBranch(b);setScr("pos");}}} className="tap fu" style={{width:"100%",background:D.w,borderRadius:16,padding:"16px 18px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14,boxShadow:D.s1,marginBottom:10,animationDelay:i*.07+"s"}}><Img src={b.type==="garsonlu"?A.kafe:b.type==="uretim"?A.kruvasan:A.kahve} size={42} round/><div><div style={{fontWeight:700,fontSize:15}}>{b.name}</div><div style={{fontSize:12,color:D.t3}}>{b.type==="garsonlu"?"Masa Planı":b.type==="uretim"?"Sevkiyat":"Hızlı Satış"}</div></div></button>)}</div><QuickBar onNav={onNav} active={companyId}/></div>;}

function Dashboard({user,onNav}){const warns=[];const dd=loadData();[dd.ltd,dd.sahis].forEach(d=>{d.krediler.forEach(k=>{const x=daysTil(k.nextDate);if(x>=0&&x<=7)warns.push(k.bank+" — "+x+"g");});d.cekler.forEach(c=>{const x=daysTil(c.vade);if(x>=0&&x<=7)warns.push("Çek "+c.no+" — "+x+"g");});});
return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><style>{G}</style><header style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:D.w,borderBottom:`1px solid ${D.blueBd}`}}><Img src={A.logo} size={38} round/><div style={{flex:1}}><div style={{fontWeight:800,fontSize:17,color:D.blue,fontFamily:D.fd}}>Bardak's</div><div style={{fontSize:11,color:D.t3}}>v12.0 — {user.name}</div></div><button onClick={()=>onNav("logout")} className="tap" style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",borderRadius:50,border:"none",background:D.blueMi,cursor:"pointer",color:D.blue,fontSize:12,fontWeight:600,fontFamily:D.f}}><Ic.Lock s={14} c={D.blue}/>Çıkış</button></header>
<div style={{flex:1,overflow:"auto",padding:"12px 16px 90px"}}>{warns.length>0&&<div className="fu" style={{background:D.rS,border:"1.5px solid rgba(220,62,53,.18)",borderRadius:14,padding:"12px 14px",marginBottom:12,animation:"glow 2s ease infinite"}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><Ic.Alert/><span style={{fontWeight:700,color:D.r,fontSize:13}}>7 Gün İçi</span></div>{warns.map((w,i)=><div key={i} style={{fontSize:12,color:D.r,paddingLeft:22}}>• {w}</div>)}</div>}
<div style={{display:"flex",flexDirection:"column",gap:12}}><button onClick={()=>onNav("ltd")} className="tap fu" style={{background:D.w,borderRadius:18,padding:"18px 20px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:16,boxShadow:D.s2}}><Img src={A.kafe} size={50} round/><div><div style={{fontWeight:800,fontSize:17,color:D.blue}}>Bardaks Limited</div><div style={{fontSize:13,color:D.t3}}>Meydan + İmalathane</div></div></button>
<button onClick={()=>onNav("sahis")} className="tap fu" style={{background:D.w,borderRadius:18,padding:"18px 20px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:16,boxShadow:D.s2,animationDelay:"0.08s"}}><Img src={A.kruvasan} size={50} round/><div><div style={{fontWeight:800,fontSize:17,color:D.blue}}>Bardaks Şahıs</div><div style={{fontSize:13,color:D.t3}}>KTÜ + Samsun</div></div></button>
{user.role==="patron"&&<button onClick={()=>onNav("finance")} className="tap fu" style={{background:`linear-gradient(145deg,${D.blue},${D.blueDk})`,borderRadius:18,padding:"18px 20px",border:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:16,color:D.w,boxShadow:D.s2,animationDelay:"0.16s"}}><Ic.Wallet s={28} c={D.w}/><div><div style={{fontWeight:800,fontSize:17}}>Merkezi Finans</div><div style={{fontSize:13,opacity:.7}}>5 Kanal + AI Operatör</div></div></button>}</div></div>
<QuickBar onNav={onNav} active="home"/></div>;}

function App(){const[user,setUser]=useState(null);const[scr,setScr]=useState("home");const nav=id=>{if(id==="logout"){setUser(null);setScr("home");return;}setScr(id);};const goHome=()=>setScr("home");
if(!user)return<PinScreen onAuth={u=>{setUser(u);setScr("home");}}/>;
if(scr==="ltd")return<CoMenu companyId="ltd" goHome={goHome} onNav={nav}/>;
if(scr==="sahis")return<CoMenu companyId="sahis" goHome={goHome} onNav={nav}/>;
if(scr==="finance")return<Finance goHome={goHome} onNav={nav}/>;
return<Dashboard user={user} onNav={nav}/>;}
const root=ReactDOM.createRoot(document.getElementById('root'));root.render(<App/>);
</script></body></html>
