const G=`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap');*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}@keyframes eu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(232,69,60,.2)}50%{box-shadow:0 0 20px rgba(232,69,60,.5)}}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:${D.blueBd};border-radius:10px}.au{animation:eu .4s cubic-bezier(.22,1,.36,1) both}.pf{transition:transform .12s cubic-bezier(.22,1,.36,1)}.pf:active{transform:scale(.965)!important}`;
const fmt=n=>n.toLocaleString("tr-TR");const fmtTL=n=>"₺"+fmt(n);const TODAY=new Date();const daysTil=ds=>Math.ceil((new Date(ds)-TODAY)/864e5);

function Section({title,total,items}){return<div className="au" style={{background:D.w,borderRadius:18,boxShadow:D.s1,border:`1px solid ${D.blueBd}`,marginBottom:14,overflow:"hidden"}}><div style={{padding:"14px 18px",borderBottom:`1px solid ${D.blueBd}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:700,fontSize:15}}>{title}</span><span style={{fontWeight:800,fontSize:16,color:D.blue}}>{fmtTL(total)}</span></div>{items.map((it,i)=><div key={i} style={{padding:"11px 18px",borderBottom:i<items.length-1?`1px solid ${D.blueGh}`:"none",display:"flex",justifyContent:"space-between",alignItems:"center",background:it.warn?"rgba(232,69,60,0.03)":"transparent"}}><div><div style={{fontWeight:600,fontSize:14,display:"flex",alignItems:"center",gap:6}}>{it.t}{it.warn&&<span style={{width:8,height:8,borderRadius:4,background:D.r,animation:"pulse 1.5s ease infinite"}}/>}</div><div style={{fontSize:12,color:D.t3}}>{it.sub}</div></div><div style={{fontWeight:700,fontSize:14,fontVariantNumeric:"tabular-nums"}}>{fmtTL(it.v)}</div></div>)}</div>;}

function FinanceHub({goHome}){const[tab,setTab]=useState("ltd");const data=tab==="ltd"?DEBTS.ltd:DEBTS.sahis;const kT=data.krediler.reduce((s,k)=>s+k.monthly*k.remaining,0);const cT=data.kartlar.reduce((s,k)=>s+k.used,0);const aT=(data.altin||[]).reduce((s,a)=>s+a.gram*a.fiyat,0);const pT=(data.piyasa||[]).reduce((s,p)=>s+p.tutar,0);const grand=kT+cT+aT+pT;
const warns=[];data.krediler.forEach(k=>{const d=daysTil(k.nextDate);if(d<=5&&d>=0)warns.push(k.bank+" kredisi "+d+" gün");});data.kartlar.forEach(k=>{const d=daysTil("2026-04-"+String(k.odeme).padStart(2,"0"));if(d<=5&&d>=0)warns.push(k.name+" kartı "+d+" gün");});
return<div style={{height:"100vh",background:D.ivory,fontFamily:D.font,color:D.t,overflow:"auto"}}><style>{G}</style><header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 24px",background:D.w,borderBottom:`1px solid ${D.blueBd}`}}><HomeBtn onClick={goHome}/><h2 style={{fontSize:17,fontWeight:700}}>Merkezi Finans</h2><div style={{width:90}}/></header>
<div style={{display:"flex",gap:0,margin:"16px 24px 0",background:D.blueMi,borderRadius:14,padding:3}}>{[{id:"ltd",label:"Limited Borçları"},{id:"sahis",label:"Şahıs Borçları"}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} className="pf" style={{flex:1,padding:"12px 16px",borderRadius:11,border:"none",cursor:"pointer",fontWeight:700,fontSize:14,fontFamily:D.font,background:tab===t.id?D.w:"transparent",color:tab===t.id?D.blue:D.t3,boxShadow:tab===t.id?D.s1:"none"}}>{t.label}</button>)}</div>
<div style={{padding:"16px 24px 40px"}}>{warns.length>0&&<div style={{background:"rgba(232,69,60,0.06)",border:"1.5px solid rgba(232,69,60,0.2)",borderRadius:16,padding:"14px 18px",marginBottom:16,animation:"glow 2s ease infinite"}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><Ic.Alert/><span style={{fontWeight:700,color:D.r,fontSize:14}}>Yaklaşan Ödemeler</span></div>{warns.map((w,i)=><div key={i} style={{fontSize:13,color:D.r,paddingLeft:26}}>• {w}</div>)}</div>}
<div className="au" style={{background:`linear-gradient(135deg,${D.blue},${D.blueDk})`,borderRadius:22,padding:"24px 24px 20px",marginBottom:18,color:D.w}}><div style={{fontSize:12,opacity:.7,marginBottom:4}}>{tab==="ltd"?"Limited Şirketi":"Şahıs İşletmesi"} — Toplam Borç</div><div style={{fontSize:34,fontWeight:800,fontFamily:D.disp,letterSpacing:"-0.03em"}}>{fmtTL(grand)}</div></div>
<Section title="🏦 Krediler" total={kT} items={data.krediler.map(k=>({t:k.bank,sub:k.remaining+" taksit × "+fmtTL(k.monthly),v:k.monthly*k.remaining,warn:daysTil(k.nextDate)<=5}))}/>
<Section title="💳 Kredi Kartları" total={cT} items={data.kartlar.map(k=>({t:k.name,sub:"Limit: "+fmtTL(k.limit)+" | Kesim: "+k.kesim+". | Ödeme: "+k.odeme+".",v:k.used,warn:daysTil("2026-04-"+String(k.odeme).padStart(2,"0"))<=5}))}/>
{data.altin&&<Section title="🥇 Altın Borçları" total={aT} items={data.altin.map(a=>({t:a.kisi,sub:a.gram+"g × ₺"+fmt(a.fiyat)+"/g",v:a.gram*a.fiyat}))}/>}
{data.piyasa&&<Section title="🤝 Piyasa Borçları" total={pT} items={data.piyasa.map(p=>({t:p.kisi,sub:p.aciklama,v:p.tutar}))}/>}
</div></div>;}

function QuickPOS({branch,goHome}){const[cat,setCat]=useState("kahve");const[cart,setCart]=useState([]);const prods=PRODS.filter(p=>p.c===cat);const total=cart.reduce((s,c)=>s+c.p*c.q,0);const add=p=>setCart(prev=>{const e=prev.find(c=>c.id===p.id);if(e)return prev.map(c=>c.id===p.id?{...c,q:c.q+1}:c);return[...prev,{...p,q:1}];});const upd=(id,d)=>setCart(prev=>prev.map(c=>c.id===id?{...c,q:Math.max(0,c.q+d)}:c).filter(c=>c.q>0));
return<div style={{height:"100vh",display:"flex",flexDirection:"column",fontFamily:D.font,background:D.ivory,color:D.t}}><style>{G}</style><header style={{display:"flex",alignItems:"center",gap:14,padding:"12px 20px",background:D.w,borderBottom:`1px solid ${D.blueBd}`}}><HomeBtn onClick={goHome}/><div><h2 style={{fontSize:16,fontWeight:700}}>Satış — {branch.name}</h2><p style={{fontSize:11,color:D.t3}}>{branch.type==="garsonlu"?"Garsonlu":"Self"} Servis</p></div></header>
<div style={{flex:1,display:"flex",overflow:"hidden"}}><div style={{flex:1,display:"flex",flexDirection:"column"}}><div style={{display:"flex",gap:8,padding:"12px 16px",overflowX:"auto"}}>{CATS.map(c=>{const ac=cat===c.id;return<button key={c.id} onClick={()=>setCat(c.id)} className="pf" style={{display:"flex",alignItems:"center",gap:8,padding:"7px 14px 7px 7px",borderRadius:50,border:"none",cursor:"pointer",background:ac?D.blue:D.w,boxShadow:ac?D.s2:D.s1}}><Img src={A[c.a]} size={28} round style={{border:ac?"2px solid rgba(255,255,255,.4)":`2px solid ${D.blueBd}`}}/><span style={{fontSize:13,fontWeight:600,color:ac?D.w:D.t,whiteSpace:"nowrap"}}>{c.name}</span></button>;})}</div>
<div style={{flex:1,overflow:"auto",padding:"6px 16px 16px"}}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>{prods.map(p=>{const ic=cart.find(c=>c.id===p.id);return<button key={p.id} onClick={()=>add(p)} className="pf" style={{background:D.w,borderRadius:14,border:ic?`2px solid ${D.blue}`:`1px solid ${D.blueBd}`,padding:"14px 10px 10px",cursor:"pointer",textAlign:"left",position:"relative",boxShadow:ic?D.s2:D.s1}}>{ic&&<div style={{position:"absolute",top:6,right:6,width:22,height:22,borderRadius:11,background:D.blue,color:D.w,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{ic.q}</div>}<div style={{fontSize:13,fontWeight:600,lineHeight:1.3,paddingRight:ic?24:0}}>{p.n}</div><div style={{fontSize:15,fontWeight:800,color:D.blue,marginTop:3}}>₺{p.p}</div></button>;})}</div></div></div>
<div style={{width:300,background:D.w,borderLeft:`1px solid ${D.blueBd}`,display:"flex",flexDirection:"column"}}><div style={{padding:"14px 18px",borderBottom:`1px solid ${D.blueBd}`}}><h3 style={{fontSize:16,fontWeight:700}}>Adisyon</h3></div><div style={{flex:1,overflow:"auto"}}>{!cart.length?<div style={{textAlign:"center",padding:30,opacity:.3}}><Ic.Coffee s={36}/><p style={{marginTop:8,fontSize:13}}>Ürün ekleyin</p></div>:cart.map(it=><div key={it.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 18px",borderBottom:`1px solid ${D.blueGh}`}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{it.n}</div><div style={{fontSize:11,color:D.t3}}>₺{it.p}×{it.q}</div></div><div style={{display:"flex",alignItems:"center",gap:2,background:D.ivory,borderRadius:50,padding:2}}><button onClick={()=>upd(it.id,-1)} className="pf" style={{width:26,height:26,borderRadius:13,border:"none",background:D.w,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>−</button><span style={{width:24,textAlign:"center",fontSize:14,fontWeight:700}}>{it.q}</span><button onClick={()=>upd(it.id,1)} className="pf" style={{width:26,height:26,borderRadius:13,border:"none",background:D.w,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>+</button></div><div style={{fontWeight:700,fontSize:14,color:D.blue,minWidth:44,textAlign:"right"}}>₺{it.p*it.q}</div></div>)}</div>
{cart.length>0&&<div style={{padding:"14px 18px",borderTop:`1px solid ${D.blueBd}`,background:`linear-gradient(${D.w},${D.ivory})`}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><span style={{fontWeight:600,color:D.t2}}>Toplam</span><span style={{fontSize:22,fontWeight:800,color:D.blue,fontFamily:D.disp}}>₺{fmt(total)}</span></div><div style={{display:"flex",gap:8}}><button className="pf" style={{flex:1,padding:12,borderRadius:14,border:"none",background:D.gS,cursor:"pointer",fontWeight:700,color:D.g,fontSize:14}}>Nakit</button><button className="pf" style={{flex:1,padding:12,borderRadius:14,border:"none",background:D.blueMi,cursor:"pointer",fontWeight:700,color:D.blue,fontSize:14}}>Kart</button></div></div>}</div></div></div>;}

function CompanyMenu({companyId,goHome,onSelectBranch,onFinance}){const branches=BRANCHES[companyId];const name=companyId==="ltd"?"Bardaks Limited Şti.":"Bardaks Şahıs İşletmesi";
return<div style={{minHeight:"100vh",background:D.ivory,fontFamily:D.font,color:D.t}}><style>{G}</style><header style={{display:"flex",alignItems:"center",gap:14,padding:"14px 24px",background:D.w,borderBottom:`1px solid ${D.blueBd}`}}><HomeBtn onClick={goHome}/><h2 style={{fontSize:17,fontWeight:700}}>{name}</h2></header>
<div style={{padding:24,maxWidth:520,margin:"0 auto"}}><h3 style={{fontSize:14,fontWeight:700,color:D.t3,marginBottom:12}}>ŞUBELER</h3><div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:28}}>{branches.map((b,i)=><button key={b.id} onClick={()=>onSelectBranch(b)} className="pf au" style={{background:D.w,borderRadius:18,padding:"18px 22px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:16,boxShadow:D.s1,animationDelay:i*0.08+"s"}}><Img src={b.type==="garsonlu"?A.kafe:b.type==="uretim"?A.kruvasan:A.kahve} size={48} round/><div><div style={{fontWeight:700,fontSize:16}}>{b.name}</div><div style={{fontSize:13,color:D.t3}}>{b.type==="garsonlu"?"Garsonlu Servis":b.type==="uretim"?"Üretim Merkezi":"Self Servis"}</div></div></button>)}</div>
<h3 style={{fontSize:14,fontWeight:700,color:D.t3,marginBottom:12}}>FİNANS</h3><button onClick={onFinance} className="pf au" style={{width:"100%",background:`linear-gradient(135deg,${D.blue},${D.blueDk})`,borderRadius:18,padding:"20px 22px",border:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:16,color:D.w,boxShadow:D.s2,animationDelay:"0.2s"}}><Ic.Wallet s={28} c={D.w}/><div><div style={{fontWeight:700,fontSize:16}}>Merkezi Finans</div><div style={{fontSize:13,opacity:.7}}>Krediler, Kartlar, Altın, Piyasa</div></div></button></div></div>;}

function App(){const[screen,setScreen]=useState("root");const[branch,setBranch]=useState(null);const goHome=()=>{setScreen("root");setBranch(null);};
if(screen==="root")return<div style={{minHeight:"100vh",background:D.ivory,fontFamily:D.font,color:D.t,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><style>{G}</style><Img src={A.logo} size={96} round style={{marginBottom:16,boxShadow:D.s2}}/><h1 style={{fontFamily:D.disp,fontSize:30,fontWeight:700,color:D.blue,marginBottom:4}}>Bardak's</h1><p style={{color:D.t3,fontSize:13,marginBottom:36}}>İşletim Sistemi v8.4</p>
<div style={{display:"flex",flexDirection:"column",gap:14,width:"100%",maxWidth:400,padding:"0 24px"}}><button onClick={()=>setScreen("ltd")} className="pf au" style={{background:D.w,borderRadius:20,padding:"22px 24px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:18,boxShadow:D.s2}}><Img src={A.kafe} size={56} round/><div><div style={{fontWeight:800,fontSize:18,color:D.blue}}>Bardaks Limited</div><div style={{fontSize:13,color:D.t3,marginTop:2}}>Meydan Şubesi • Garsonlu Servis</div></div></button>
<button onClick={()=>setScreen("sahis")} className="pf au" style={{background:D.w,borderRadius:20,padding:"22px 24px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:18,boxShadow:D.s2,animationDelay:"0.1s"}}><Img src={A.kruvasan} size={56} round/><div><div style={{fontWeight:800,fontSize:18,color:D.blue}}>Bardaks Şahıs</div><div style={{fontSize:13,color:D.t3,marginTop:2}}>KTÜ • Samsun • İmalathane</div></div></button>
<button onClick={()=>setScreen("finance")} className="pf au" style={{background:`linear-gradient(135deg,${D.blue},${D.blueDk})`,borderRadius:20,padding:"20px 24px",border:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:18,color:D.w,boxShadow:D.s2,animationDelay:"0.2s"}}><Ic.Wallet s={32} c={D.w}/><div><div style={{fontWeight:800,fontSize:18}}>Merkezi Finans</div><div style={{fontSize:13,opacity:.7,marginTop:2}}>Tüm borçlar tek merkezde</div></div></button></div></div>;
if(screen==="finance")return<FinanceHub goHome={goHome}/>;
if(screen==="pos"&&branch)return<QuickPOS branch={branch} goHome={goHome}/>;
if(screen==="ltd"||screen==="sahis")return<CompanyMenu companyId={screen} goHome={goHome} onSelectBranch={b=>{setBranch(b);setScreen("pos");}} onFinance={()=>setScreen("finance")}/>;
return null;}
const root=ReactDOM.createRoot(document.getElementById('root'));root.render(<App/>);
</script>
</body>
</html>
