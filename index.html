*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

.si{animation:scaleIn .4s cubic-bezier(.16,1,.3,1) both}
.tap{transition:transform .15s cubic-bezier(.16,1,.3,1),box-shadow .15s ease}
.tap:active{transform:scale(.96)!important}
.tap:hover{box-shadow:${D.s2}}
input:focus,select:focus{border-color:${D.blue}!important;outline:none}`;

}

    <div style={{width:270,background:D.w,borderLeft:`1px solid ${D.blueBd}`,display:"flex",flexDirection:"column"}}><div style={{padding:"14px 16px",borderBottom:`1px solid ${D.blueBd}`,fontWeight:700}}>Adisyon</div><div style={{flex:1,overflow:"auto"}}>{!cart.length?<div style={{textAlign:"center",padding:24,opacity:.3,fontSize:13}}>Ürün ekleyin</div>:cart.map(it=><div key={it.id} style={{display:"flex",justifyContent:"space-between",padding:"9px 16px",borderBottom:`1px solid ${D.blueGh}`,fontSize:13}}><span>{it.q}× {it.n}</span><span style={{fontWeight:700,color:D.blue}}>₺{it.p*it.q}</span></div>)}</div>{cart.length>0&&<div style={{padding:"14px 16px",borderTop:`1px solid ${D.blueBd}`,background:D.ivory}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontWeight:600}}>Toplam</span><span style={{fontSize:20,fontWeight:800,color:D.blue,fontFamily:D.fd}}>₺{fmt(total)}</span></div><div style={{display:"flex",gap:8}}><button className="tap" style={{flex:1,padding:11,borderRadius:12,border:"none",background:D.gS,cursor:"pointer",fontWeight:700,color:D.g,fontSize:13,fontFamily:D.f}}>Nakit</button><button className="tap" style={{flex:1,padding:11,borderRadius:12,border:"none",background:D.blueMi,cursor:"pointer",fontWeight:700,color:D.blue,fontSize:13,fontFamily:D.f}}>Kart</button></div></div>}</div></div><QuickBar onNav={onNav} active="sahis"/></div>;
}

/* ═══ SEVKİYAT ═══ */
function Sevk({goHome,goBack,onNav}){
  const[items,setItems]=useState(SEVK.map(i=>({...i,qty:0})));const[target,setTarget]=useState("meydan");
  const setQ=(id,q)=>setItems(p=>p.map(it=>it.id===id?{...it,qty:Math.max(0,q)}:it));
  return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}><Header title="Sevkiyat — İmalathane" crumbs="Ana Sayfa › Limited › İmalathane" sub="Üretim Merkezi" onHome={goHome} onBack={goBack}/><div style={{flex:1,overflow:"auto",padding:18}}><div style={{background:D.w,borderRadius:18,boxShadow:D.s2,padding:22,maxWidth:480,margin:"0 auto"}}>
    <label style={{fontSize:12,fontWeight:600,color:D.t3,display:"block",marginBottom:6}}>Hedef Şube</label>
    <select value={target} onChange={e=>setTarget(e.target.value)} style={{width:"100%",padding:"12px 14px",borderRadius:12,border:`2px solid ${D.blueBd}`,fontSize:15,fontWeight:600,fontFamily:D.f,marginBottom:18}}>
      <option value="meydan">Meydan (Limited)</option><option value="ktu">KTÜ (Şahıs)</option><option value="samsun">Samsun (Şahıs)</option>
    </select>
    {items.map(it=><div key={it.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",borderBottom:`1px solid ${D.blueGh}`}}>
      <div><div style={{fontWeight:600,fontSize:15}}>{it.n}</div><div style={{fontSize:12,color:D.t3}}>{it.u}</div></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button onClick={()=>setQ(it.id,it.qty-1)} className="tap" style={{width:34,height:34,borderRadius:17,border:"none",background:D.ivory,cursor:"pointer",fontSize:18,fontWeight:700,fontFamily:D.f}}>−</button>
        <span style={{width:30,textAlign:"center",fontSize:17,fontWeight:700}}>{it.qty}</span>
        <button onClick={()=>setQ(it.id,it.qty+1)} className="tap" style={{width:34,height:34,borderRadius:17,border:"none",background:D.ivory,cursor:"pointer",fontSize:18,fontWeight:700,fontFamily:D.f}}>+</button>
      </div>
    </div>)}
    {items.some(i=>i.qty>0)&&<button className="tap" style={{width:"100%",padding:16,borderRadius:16,border:"none",background:D.blue,color:D.w,fontSize:16,fontWeight:700,cursor:"pointer",marginTop:18,display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontFamily:D.f}}><Ic.Truck s={22} c={D.w}/>Sevk Et</button>}
  </div></div><QuickBar onNav={onNav} active="ltd"/></div>;
}

/* ═══ COMPANY MENU ═══ */
function CoMenu({companyId,goHome,onNav,user}){
  const[scr,setScr]=useState("menu");const[branch,setBranch]=useState(null);
  const branches=BRANCHES[companyId];const name=companyId==="ltd"?"Bardaks Limited":"Bardaks Şahıs";const goMenu=()=>{setScr("menu");setBranch(null);};
  if(scr==="masa")return<Masa goHome={goHome} goBack={goMenu} onNav={onNav}/>;
  if(scr==="pos"&&branch)return<POS branch={branch} goHome={goHome} goBack={goMenu} onNav={onNav}/>;
  if(scr==="sevk")return<Sevk goHome={goHome} goBack={goMenu} onNav={onNav}/>;
  return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}>
    <Header title={name} crumbs={"Ana Sayfa › "+(companyId==="ltd"?"Limited":"Şahıs")} onHome={goHome}/>
    <div style={{flex:1,overflow:"auto",padding:18,maxWidth:480,margin:"0 auto",width:"100%"}}>
      <h3 style={{fontSize:12,fontWeight:700,color:D.t3,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>Şubeler</h3>
      {branches.map((b,i)=><button key={b.id} onClick={()=>{if(b.type==="garsonlu")setScr("masa");else if(b.type==="uretim")setScr("sevk");else{setBranch(b);setScr("pos");}}} className="tap fu" style={{width:"100%",background:D.w,borderRadius:18,padding:"18px 20px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:16,boxShadow:D.s1,marginBottom:12,animationDelay:i*.07+"s"}}>
        <Img src={b.type==="garsonlu"?A.kafe:b.type==="uretim"?A.kruvasan:A.kahve} size={48} round/>
        <div><div style={{fontWeight:700,fontSize:16}}>{b.name}</div><div style={{fontSize:13,color:D.t3}}>{b.type==="garsonlu"?"Masa Planı":b.type==="uretim"?"Sevkiyat":"Hızlı Satış"}</div></div>
      </button>)}
    </div>
    <QuickBar onNav={onNav} active={companyId}/>
  </div>;
}

/* ═══ HOME DASHBOARD ═══ */
function Dashboard({user,onNav}){
  const isP=user.role==="patron";
  const warns=[];
  DEBTS.ltd.krediler.forEach(k=>{const d=daysTil(k.nextDate);if(d<=7&&d>=0)warns.push(k.bank+" — "+d+" gün");});
  DEBTS.sahis.krediler.forEach(k=>{const d=daysTil(k.nextDate);if(d<=7&&d>=0)warns.push(k.bank+" — "+d+" gün");});

  return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:D.ivory,fontFamily:D.f,color:D.t}}>
    <style>{G}</style>
    <header style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",background:D.w,borderBottom:`1px solid ${D.blueBd}`}}>
      <Img src={A.logo} size={40} round/>
      <div style={{flex:1}}><div style={{fontWeight:800,fontSize:18,color:D.blue,fontFamily:D.fd}}>Bardak's</div><div style={{fontSize:11,color:D.t3}}>v10.0 — {user.name}</div></div>
      <button onClick={()=>onNav("logout")} className="tap" style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:50,border:"none",background:D.blueMi,cursor:"pointer",color:D.blue,fontSize:12,fontWeight:600,fontFamily:D.f}}><Ic.Lock s={14} c={D.blue}/>Çıkış</button>
    </header>
    <div style={{flex:1,overflow:"auto",padding:"16px 18px 100px"}}>
      {/* Kritik Özet (Patron only) */}
      {isP&&warns.length>0&&<div className="fu" style={{background:D.rS,border:"1.5px solid rgba(220,62,53,0.18)",borderRadius:16,padding:"14px 16px",marginBottom:14,animation:"glow 2s ease infinite"}}><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}><Ic.Alert/><span style={{fontWeight:700,color:D.r,fontSize:14}}>Yaklaşan Ödemeler</span></div>{warns.map((w,i)=><div key={i} style={{fontSize:13,color:D.r,paddingLeft:24}}>• {w}</div>)}</div>}

      {isP&&<div className="fu" style={{background:`linear-gradient(145deg,${D.blue},${D.blueDk})`,borderRadius:20,padding:"22px",marginBottom:16,color:D.w}}>
        <div style={{fontSize:12,opacity:.6}}>Günün Kritik Özeti</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginTop:12}}>
          <div style={{background:"rgba(255,255,255,.1)",borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:11,opacity:.6}}>Bugün Ciro</div><div style={{fontSize:20,fontWeight:800,fontFamily:D.fd,marginTop:2}}>₺17.485</div></div>
          <div style={{background:"rgba(255,255,255,.1)",borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:11,opacity:.6}}>Nakit / Kart</div><div style={{fontSize:14,fontWeight:700,marginTop:4}}>₺3.030 / ₺14.455</div></div>
          <div style={{background:"rgba(255,255,255,.1)",borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:11,opacity:.6}}>Son Sevkiyat</div><div style={{fontSize:14,fontWeight:700,marginTop:4}}>24 Mart</div></div>
        </div>
      </div>}

      {/* 3 Ana Blok */}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <button onClick={()=>onNav("ltd")} className="tap fu" style={{background:D.w,borderRadius:20,padding:"20px 22px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:18,boxShadow:D.s2}}>
          <Img src={A.kafe} size={54} round style={{boxShadow:D.s1}}/><div><div style={{fontWeight:800,fontSize:18,color:D.blue}}>Bardaks Limited</div><div style={{fontSize:13,color:D.t3,marginTop:2}}>Meydan + İmalathane</div></div>
        </button>
        <button onClick={()=>onNav("sahis")} className="tap fu" style={{background:D.w,borderRadius:20,padding:"20px 22px",border:`1.5px solid ${D.blueBd}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:18,boxShadow:D.s2,animationDelay:"0.08s"}}>
          <Img src={A.kruvasan} size={54} round style={{boxShadow:D.s1}}/><div><div style={{fontWeight:800,fontSize:18,color:D.blue}}>Bardaks Şahıs</div><div style={{fontSize:13,color:D.t3,marginTop:2}}>KTÜ + Samsun</div></div>
        </button>
        {isP&&<button onClick={()=>onNav("finance")} className="tap fu" style={{background:`linear-gradient(145deg,${D.blue},${D.blueDk})`,borderRadius:20,padding:"20px 22px",border:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:18,color:D.w,boxShadow:D.s2,animationDelay:"0.16s"}}>
          <Ic.Wallet s={32} c={D.w}/><div><div style={{fontWeight:800,fontSize:18}}>Merkezi Finans</div><div style={{fontSize:13,opacity:.7,marginTop:2}}>Krediler • Kartlar • Altın • Piyasa</div></div>
        </button>}
      </div>
    </div>
    <QuickBar onNav={onNav} active="home"/>
  </div>;
}

/* ═══ ROOT ═══ */
function App(){
  const[user,setUser]=useState(null);const[scr,setScr]=useState("home");
  const nav=id=>{if(id==="logout"){setUser(null);setScr("home");return;}setScr(id);};
  const goHome=()=>setScr("home");
  if(!user)return<PinScreen onAuth={u=>{setUser(u);setScr("home");}}/>;
  if(scr==="ltd")return<CoMenu companyId="ltd" goHome={goHome} onNav={nav} user={user}/>;
  if(scr==="sahis")return<CoMenu companyId="sahis" goHome={goHome} onNav={nav} user={user}/>;
  if(scr==="finance")return<Finance goHome={goHome} onNav={nav}/>;
  return<Dashboard user={user} onNav={nav}/>;
}
const root=ReactDOM.createRoot(document.getElementById('root'));root.render(<App/>);
</script>
</body>
</html>
